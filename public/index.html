<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarnov Restaurant — Kirish</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#C8922A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tarnov">
  <link rel="apple-touch-icon" href="/images/icon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { color: var(--text3); font-size: 0.75rem; }
    .login-tab i { width: 15px; height: 15px; }
    #particle-canvas { position:fixed; inset:0; pointer-events:none; z-index:0; }
    .login-page, .login-container { position: relative; z-index: 1; }
    .neon-toggle-wrap {
      position: fixed; top: 16px; right: 16px; z-index: 100;
      display: flex; align-items: center; gap: 8px;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.07); border-radius: 20px;
      padding: 6px 12px; font-size: 0.72rem; color: var(--text3);
    }
  </style>
</head>
<body>
  <canvas id="particle-canvas"></canvas>
  <div class="neon-toggle-wrap">
    <span>⚡ Neon</span>
    <button class="neon-toggle" id="neon-btn" onclick="toggleNeon()" title="Neon mode"></button>
  </div>
  <div id="toast-container"></div>
  <div class="login-page">
    <div class="login-container">

      <div class="login-logo">
        <img src="/images/logo.jpg" alt="Tarnov Restaurant" class="logo-img"
             onerror="this.src='/images/logo.svg'">
        <p>Training Platform</p>
      </div>

      <div class="login-card">
        <div class="login-tabs">
          <button class="login-tab active" onclick="switchTab('superadmin', event)">
            <i data-lucide="zap"></i> Super Admin
          </button>
          <button class="login-tab" onclick="switchTab('restaurant', event)">
            <i data-lucide="store"></i> Admin
          </button>
          <button class="login-tab" onclick="switchTab('waiter', event)">
            <i data-lucide="chef-hat"></i> Ofitsiant
          </button>
        </div>

        <!-- Super Admin -->
        <div class="tab-panel active" id="panel-superadmin">
          <div class="form-group">
            <label>Email manzil</label>
            <input type="email" class="form-control" id="sa-email" placeholder="admin@tarnov.uz">
          </div>
          <div class="form-group">
            <label>Parol</label>
            <input type="password" class="form-control" id="sa-password" placeholder="••••••••">
          </div>
          <button class="btn btn-gold btn-full btn-lg" onclick="login('superadmin')">
            Kirish
          </button>
        </div>

        <!-- Restaurant Admin -->
        <div class="tab-panel" id="panel-restaurant">
          <div class="form-group">
            <label>Email manzil</label>
            <input type="email" class="form-control" id="ra-email" placeholder="admin@restaurant.uz">
          </div>
          <div class="form-group">
            <label>Parol</label>
            <input type="password" class="form-control" id="ra-password" placeholder="••••••••">
          </div>
          <button class="btn btn-gold btn-full btn-lg" onclick="login('restaurant')">
            Kirish
          </button>
        </div>

        <!-- Waiter -->
        <div class="tab-panel" id="panel-waiter">
          <div class="form-group">
            <label>Restoranni tanlang</label>
            <select class="form-control" id="w-restaurant">
              <option value="">— Restoran tanlang —</option>
            </select>
          </div>
          <div class="form-group">
            <label>4 xonali PIN</label>
            <input type="password" class="form-control pin-input" id="w-pin" placeholder="• • • •" maxlength="4" inputmode="numeric" pattern="\d{4}">
          </div>
          <button class="btn btn-gold btn-full btn-lg" onclick="login('waiter')">
            Kirish
          </button>
        </div>

        <div id="login-error" class="alert alert-danger" style="display:none;margin-top:16px"></div>
      </div>

      <p style="text-align:center;margin-top:24px;font-size:0.75rem;color:var(--text3)">
        ✦ Tarnov Restaurant HR Training Platform ✦
      </p>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script>
    lucide.createIcons();

    function switchTab(type, event) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
      document.getElementById(`panel-${type}`).classList.add('active');
      event.currentTarget.classList.add('active');
      document.getElementById('login-error').style.display = 'none';
      if (type === 'waiter') loadRestaurants();
    }

    async function loadRestaurants() {
      try {
        const list = await api('/api/restaurants/list');
        const sel = document.getElementById('w-restaurant');
        sel.innerHTML = '<option value="">— Restoran tanlang —</option>';
        list.forEach(r => {
          const opt = document.createElement('option');
          opt.value = r.id;
          opt.textContent = r.name + (r.location ? ` — ${r.location}` : '');
          sel.appendChild(opt);
        });
      } catch {}
    }

    async function login(type) {
      const errEl = document.getElementById('login-error');
      errEl.style.display = 'none';
      let body = { loginType: type };

      if (type === 'superadmin') {
        body.email = document.getElementById('sa-email').value.trim();
        body.password = document.getElementById('sa-password').value;
      } else if (type === 'restaurant') {
        body.email = document.getElementById('ra-email').value.trim();
        body.password = document.getElementById('ra-password').value;
      } else {
        body.restaurantId = document.getElementById('w-restaurant').value;
        body.pin = document.getElementById('w-pin').value;
      }

      try {
        const res = await api('/api/auth/login', { method: 'POST', body: JSON.stringify(body) });
        window.location.href = res.redirect;
      } catch (e) {
        errEl.textContent = e.message || 'Kirish amalga oshmadi';
        errEl.style.display = 'flex';
      }
    }

    document.addEventListener('keypress', e => {
      if (e.key === 'Enter') {
        const active = document.querySelector('.tab-panel.active');
        const type = active.id.replace('panel-', '');
        login(type);
      }
    });

    api('/api/auth/me').then(user => {
      if (user.role === 'superadmin') window.location.href = '/super-admin.html';
      else if (user.role === 'restaurant') window.location.href = '/restaurant-admin.html';
      else if (user.role === 'waiter') window.location.href = '/waiter.html';
    }).catch(() => {});

    // ── Neon toggle ──
    function toggleNeon() {
      const on = document.body.classList.toggle('neon-mode');
      document.getElementById('neon-btn').classList.toggle('on', on);
      localStorage.setItem('neonMode', on ? '1' : '');
    }
    if (localStorage.getItem('neonMode')) {
      document.body.classList.add('neon-mode');
      document.getElementById('neon-btn').classList.add('on');
    }

    // ── Particle canvas ──
    (function() {
      const canvas = document.getElementById('particle-canvas');
      const ctx = canvas.getContext('2d');
      let W, H, particles = [];

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      function rand(min, max) { return Math.random() * (max - min) + min; }

      function mkParticle() {
        return {
          x: rand(0, W), y: rand(0, H),
          r: rand(0.6, 2.2),
          vx: rand(-0.18, 0.18), vy: rand(-0.28, -0.08),
          alpha: rand(0.15, 0.55),
          da: rand(0.003, 0.008),
          fadeIn: true
        };
      }

      for (let i = 0; i < 90; i++) particles.push(mkParticle());

      function isNeon() { return document.body.classList.contains('neon-mode'); }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        const color = isNeon() ? '0,245,255' : '200,146,42';
        particles.forEach(p => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${color},${p.alpha})`;
          ctx.fill();

          p.x += p.vx;
          p.y += p.vy;
          if (p.fadeIn) { p.alpha += p.da; if (p.alpha >= 0.55) p.fadeIn = false; }
          else          { p.alpha -= p.da; }

          if (p.y < -10 || p.alpha <= 0) Object.assign(p, mkParticle(), { y: H + 5, alpha: 0, fadeIn: true });
          if (p.x < 0) p.x = W;
          if (p.x > W) p.x = 0;
        });
        requestAnimationFrame(draw);
      }
      draw();
    })();
  </script>
</body>
</html>
