<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RestoOne — Admin Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Mulish:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Mulish',sans-serif;background:#F2ECE1;color:#19241D;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:rgba(20,41,31,.18);border-radius:6px}
::-webkit-scrollbar-track{background:transparent}
@keyframes fadeup{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes slidein{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes pop{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes grow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
@keyframes growX{from{transform:scaleX(0)}to{transform:scaleX(1)}}
.app{display:flex;height:100vh;overflow:hidden}

/* ─── SIDEBAR ─── */
.sidebar{flex:none;width:222px;height:100%;background:linear-gradient(180deg,#16291F 0%,#102018 100%);display:flex;flex-direction:column;border-right:1px solid rgba(201,168,76,.12);transition:width .3s cubic-bezier(.4,0,.2,1);position:relative;z-index:20}
.sidebar.collapsed{width:68px}
.sb-logo{padding:22px 16px 18px;display:flex;align-items:center;gap:11px;overflow:hidden}
.sb-mark{width:40px;height:40px;flex:none;border-radius:11px;background:linear-gradient(135deg,#C9A84C,#9C7E2E);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(201,168,76,.28);cursor:pointer;transition:transform .2s}
.sb-mark:hover{transform:scale(1.05)}
.sb-mark span{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:700;font-size:24px;color:#14291F;line-height:1}
.sb-brand{overflow:hidden;white-space:nowrap;transition:opacity .25s,width .3s}
.sidebar.collapsed .sb-brand{opacity:0;width:0}
.sb-brand-name{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:600;color:#F5EFDF;letter-spacing:.5px;line-height:1}
.sb-brand-sub{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(201,168,76,.7);margin-top:3px;font-weight:600}
.sb-nav{flex:1;overflow-y:auto;overflow-x:hidden;padding:4px 12px 16px}
.sb-group{margin-bottom:16px}
.sb-group-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(201,168,76,.4);font-weight:700;padding:0 12px 6px;white-space:nowrap;transition:opacity .25s}
.sidebar.collapsed .sb-group-label{opacity:0}
.sb-item{display:flex;align-items:center;gap:13px;cursor:pointer;padding:9px 12px;border-radius:10px;position:relative;transition:all .22s ease;color:rgba(226,222,210,.6)}
.sidebar.collapsed .sb-item{justify-content:center;padding:10px 0}
.sb-item:hover{background:rgba(201,168,76,.08);color:rgba(226,222,210,.85)}
.sb-item.active{background:rgba(201,168,76,.14);color:#F5EFDF}
.sb-bar{position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:0;background:#C9A84C;border-radius:2px;transition:height .25s}
.sb-item.active .sb-bar{height:18px}
.sidebar.collapsed .sb-bar{display:none}
.sb-num{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;width:22px;text-align:center;flex:none;color:rgba(201,168,76,.45);transition:color .22s}
.sb-item.active .sb-num{color:#C9A84C}
.sb-label{font-size:13.5px;font-weight:600;white-space:nowrap;transition:opacity .25s,width .3s}
.sidebar.collapsed .sb-label{opacity:0;width:0;overflow:hidden}
.sb-footer{padding:14px;border-top:1px solid rgba(201,168,76,.12);display:flex;flex-direction:column;gap:0;overflow:hidden}
.sb-user-row{display:flex;align-items:center;gap:11px;width:100%}
.sb-logout{display:flex;align-items:center;gap:9px;cursor:pointer;padding:9px 12px;border-radius:10px;color:rgba(226,222,210,.4);transition:all .22s;margin-top:6px;width:100%}
.sb-logout:hover{background:rgba(194,91,76,.12);color:#C25B4C}
.sb-logout-icon{width:16px;height:16px;flex:none;stroke:currentColor;fill:none;stroke-width:1.8}
.sb-logout-label{font-size:13px;font-weight:600;white-space:nowrap;transition:opacity .25s,width .3s}
.sidebar.collapsed .sb-logout{justify-content:center;padding:10px 0}
.sidebar.collapsed .sb-logout-label{opacity:0;width:0;overflow:hidden}
.sb-avatar{width:36px;height:36px;flex:none;border-radius:50%;background:#1B3A2D;border:1px solid rgba(201,168,76,.3);display:flex;align-items:center;justify-content:center;font-weight:800;color:#C9A84C;font-size:13px}
.sb-user{overflow:hidden;white-space:nowrap;transition:opacity .25s}
.sidebar.collapsed .sb-user{opacity:0;width:0}
.sb-user-name{font-size:13px;font-weight:700;color:#F5EFDF}
.sb-user-sub{font-size:11px;color:rgba(226,222,210,.45);margin-top:1px}

/* ─── MAIN ─── */
.main{flex:1;height:100%;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{flex:none;height:72px;padding:0 30px;display:flex;align-items:center;gap:18px;border-bottom:1px solid rgba(20,41,31,.10);background:#fff}
.tb-title-group{display:flex;align-items:baseline;gap:11px}
.tb-num{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:700;color:#C9A84C;line-height:1}
.tb-info .tb-title{font-family:'Cormorant Garamond',serif;font-size:25px;font-weight:600;color:#19241D;line-height:1}
.tb-info .tb-sub{font-size:12px;color:#6B7A6F;margin-top:2px}
.tb-space{flex:1}
.tb-search{display:flex;align-items:center;gap:9px;background:#FBF7EF;border:1px solid rgba(20,41,31,.10);border-radius:30px;padding:9px 17px;min-width:210px;cursor:text}
.tb-search-ring{width:12px;height:12px;border:1.5px solid #6B7A6F;border-radius:50%;flex:none}
.tb-search span{font-size:13px;color:#6B7A6F}
.tb-bell{width:40px;height:40px;border-radius:50%;border:1px solid rgba(20,41,31,.10);display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;flex:none;background:none;transition:background .2s}
.tb-bell:hover{background:#FBF7EF}
.tb-bell svg{width:16px;height:16px;stroke:#19241D;fill:none;stroke-width:1.5}
.tb-dot{position:absolute;top:9px;right:9px;width:8px;height:8px;border-radius:50%;background:#C25B4C;border:1.5px solid #fff}
.content{flex:1;overflow-y:auto;padding:26px 30px 50px}

/* ─── CARDS ─── */
.card{background:#fff;border:1px solid rgba(20,41,31,.10);border-radius:18px;padding:22px}
.card-hd{display:flex;align-items:baseline;gap:8px;margin-bottom:16px}
.card-hd-n{font-family:'Cormorant Garamond',serif;font-size:15px;color:#C9A84C;font-weight:600}
.card-hd-t{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:#19241D}

/* ─── BUTTONS ─── */
.btn-gold{padding:10px 20px;border-radius:30px;background:linear-gradient(100deg,#C9A84C,#B08F35);color:#14291F;font-size:13px;font-weight:800;cursor:pointer;border:none;letter-spacing:.3px;box-shadow:0 6px 18px rgba(201,168,76,.25);transition:transform .2s,opacity .2s;font-family:'Mulish',sans-serif;white-space:nowrap}
.btn-gold:hover{opacity:.9;transform:translateY(-1px)}
.btn-gold:active{transform:scale(.97)}
.btn-outline{padding:10px 20px;border-radius:30px;border:1px solid rgba(20,41,31,.12);color:#19241D;font-size:13px;font-weight:700;cursor:pointer;background:transparent;transition:background .2s;font-family:'Mulish',sans-serif}
.btn-outline:hover{background:#FBF7EF}
.btn-ghost{padding:10px 20px;border-radius:30px;border:1px dashed rgba(20,41,31,.18);color:#6B7A6F;font-size:13px;font-weight:600;cursor:pointer;background:transparent;font-family:'Mulish',sans-serif}

/* ─── BADGE ─── */
.pill{display:inline-flex;align-items:center;padding:3px 11px;border-radius:20px;font-size:12px;font-weight:700}
.pill-g{background:rgba(91,154,107,.12);color:#3B7A50}
.pill-r{background:rgba(194,91,76,.12);color:#A03020}
.pill-y{background:rgba(201,168,76,.14);color:#7A5E20}

/* ─── TABLE ─── */
.tbl{background:#fff;border:1px solid rgba(20,41,31,.10);border-radius:18px;overflow:hidden}
.tbl-hd{display:grid;padding:13px 22px;border-bottom:1px solid rgba(20,41,31,.10);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#6B7A6F;font-weight:700}
.tbl-row{display:grid;align-items:center;padding:13px 22px;border-bottom:1px solid rgba(20,41,31,.07);transition:background .15s}
.tbl-row:last-child{border-bottom:none}
.tbl-row:hover{background:#FBF7EF}

/* ─── TOGGLE ─── */
.tog{width:38px;height:20px;border-radius:10px;position:relative;cursor:pointer;transition:background .25s;flex:none;border:none}
.tog.on{background:#5B9A6B}
.tog.off{background:rgba(20,41,31,.15)}
.tog-knob{position:absolute;top:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .25s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.tog.on .tog-knob{left:20px}
.tog.off .tog-knob{left:2px}

/* ─── PROG BAR ─── */
.prog{height:7px;border-radius:5px;background:rgba(20,41,31,.07);overflow:hidden}
.prog-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#5B9A6B,#C9A84C);transform-origin:left;animation:growX .8s cubic-bezier(.2,.7,.3,1) both}

/* ─── SLIDE-OVER ─── */
.ov{position:fixed;inset:0;z-index:60;display:flex;justify-content:flex-end}
.ov-bg{position:absolute;inset:0;background:rgba(15,28,21,.5);backdrop-filter:blur(3px);animation:fade .3s ease}
.panel{position:relative;width:440px;max-width:92vw;height:100%;background:#fff;box-shadow:-18px 0 50px rgba(0,0,0,.18);animation:slidein .32s cubic-bezier(.4,0,.2,1);overflow-y:auto;display:flex;flex-direction:column}
.panel-hd{padding:22px 26px;border-bottom:1px solid rgba(20,41,31,.10);display:flex;align-items:center;justify-content:space-between;flex:none}
.panel-hd-title{display:flex;align-items:baseline;gap:9px}
.panel-hd-plus{font-family:'Cormorant Garamond',serif;font-size:20px;color:#C9A84C;font-weight:600}
.panel-hd-text{font-family:'Cormorant Garamond',serif;font-size:23px;font-weight:600;color:#19241D}
.panel-close{width:32px;height:32px;border-radius:50%;border:1px solid rgba(20,41,31,.12);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:#6B7A6F;background:none;line-height:1}
.panel-body{padding:24px 26px;flex:1}
.f-label{display:block;font-size:12px;font-weight:700;color:#6B7A6F;margin-bottom:6px;letter-spacing:.3px}
.f-input{width:100%;height:44px;border-radius:11px;border:1px solid rgba(20,41,31,.12);background:#FBF7EF;font-size:14px;color:#19241D;padding:0 15px;font-family:'Mulish',sans-serif;outline:none;transition:border .2s}
.f-input:focus{border-color:rgba(201,168,76,.5)}
.f-area{width:100%;min-height:80px;border-radius:11px;border:1px solid rgba(20,41,31,.12);background:#FBF7EF;font-size:14px;color:#19241D;padding:11px 15px;font-family:'Mulish',sans-serif;resize:vertical;outline:none;transition:border .2s}
.f-area:focus{border-color:rgba(201,168,76,.5)}
.f-sel{width:100%;height:44px;border-radius:11px;border:1px solid rgba(20,41,31,.12);background:#FBF7EF;font-size:14px;color:#19241D;padding:0 15px;font-family:'Mulish',sans-serif;outline:none;appearance:none}
.f-row{margin-bottom:16px}
.f-actions{display:flex;gap:10px;margin-top:26px}

/* ─── MODAL ─── */
.modal-wrap{position:fixed;inset:0;z-index:70;display:flex;align-items:center;justify-content:center;padding:24px}
.modal-bg{position:absolute;inset:0;background:rgba(15,28,21,.55);backdrop-filter:blur(3px);animation:fade .3s ease}
.modal{position:relative;width:460px;max-width:100%;background:#fff;border-radius:22px;overflow:hidden;animation:pop .32s cubic-bezier(.2,.7,.3,1);box-shadow:0 28px 70px rgba(0,0,0,.22)}
.modal-hd{background:linear-gradient(120deg,#16291F,#1B3A2D);padding:26px 28px;position:relative;overflow:hidden}
.modal-ghost{position:absolute;top:-12px;right:16px;font-family:'Cormorant Garamond',serif;font-size:110px;color:rgba(201,168,76,.08);line-height:1;pointer-events:none}
.modal-eyebrow{font-size:10.5px;letter-spacing:2px;text-transform:uppercase;color:rgba(201,168,76,.8);font-weight:700;margin-bottom:5px}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:27px;font-weight:600;color:#F5EFDF}
.modal-body{padding:24px 28px}

/* ─── ALLERGEN CHIPS ─── */
.ach{display:flex;gap:7px;flex-wrap:wrap}
.ac{padding:6px 13px;border-radius:20px;border:1px solid rgba(20,41,31,.12);font-size:12px;color:#6B7A6F;cursor:pointer;transition:all .2s;user-select:none}
.ac.active{background:#14291F;color:#C9A84C;border-color:#14291F}

/* ─── DIFF BUTTONS ─── */
.diff-g{display:flex;gap:8px}
.diff-b{flex:1;text-align:center;padding:10px;border-radius:10px;border:1px solid rgba(20,41,31,.12);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;color:#6B7A6F}
.diff-b.easy.on{background:rgba(91,154,107,.14);border-color:#5B9A6B;color:#3B7A50}
.diff-b.medium.on{background:rgba(201,168,76,.14);border-color:#C9A84C;color:#7A5E20}
.diff-b.hard.on{background:rgba(194,91,76,.12);border-color:#C25B4C;color:#A03020}

/* ─── CALENDAR ─── */
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
.cal-c{aspect-ratio:1;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;border:1.5px solid transparent}
.cal-c.normal{background:#FBF7EF;color:#19241D}
.cal-c.normal:hover{background:#F0E8D0;transform:scale(1.06)}
.cal-c.testday{background:#14291F;color:#C9A84C;border-color:#C9A84C}
.cal-c.today{border-color:rgba(201,168,76,.5)!important}

/* ─── ANS RADIO ─── */
.ans-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.a-radio{width:22px;height:22px;border-radius:50%;border:2px solid rgba(20,41,31,.18);flex:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .2s;background:none}
.a-radio.ok{border-color:#5B9A6B}
.a-radio.ok::after{content:'';width:10px;height:10px;border-radius:50%;background:#5B9A6B}

/* ─── ADAPT TABS ─── */
.adapt-tabs{display:flex;border-bottom:1px solid rgba(20,41,31,.10);margin-bottom:20px}
.adapt-tab{padding:11px 18px;cursor:pointer;position:relative;font-size:13.5px;font-weight:700;color:#6B7A6F;transition:color .2s}
.adapt-tab.on{color:#19241D}
.adapt-tab.on::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:#C9A84C}

/* ─── TOAST ─── */
.toast-wrap{position:fixed;bottom:26px;right:26px;z-index:200;display:flex;flex-direction:column;gap:9px;pointer-events:none}
.toast{padding:13px 18px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 8px 26px rgba(0,0,0,.16);animation:fadeup .3s ease both;pointer-events:auto;display:flex;align-items:center;gap:10px;max-width:310px}
.t-ok{background:#14291F;color:#C9A84C}
.t-err{background:#C25B4C;color:#fff}

/* ─── IMG UPLOAD ─── */
.img-up{height:138px;border-radius:12px;border:1px dashed rgba(20,41,31,.18);background:#FBF7EF;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-bottom:20px;overflow:hidden;position:relative}
.img-up img{width:100%;height:100%;object-fit:cover}
.img-up-lbl{font-size:12px;color:#6B7A6F;letter-spacing:.5px}

/* ─── TRAINING TOPICS ─── */
.topic-card{background:#fff;border:1px solid rgba(20,41,31,.10);border-radius:16px;overflow:hidden;transition:transform .25s,box-shadow .25s}
.topic-card:hover{transform:translateY(-4px);box-shadow:0 16px 34px rgba(20,41,31,.10)}
.topic-accent{height:4px}
.topic-body{padding:18px}
.topic-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;color:rgba(20,41,31,.07);line-height:1;margin-bottom:5px}
.topic-title{font-size:13.5px;font-weight:700;color:#19241D;margin-bottom:6px;line-height:1.35}
.topic-sub{font-size:12px;color:#6B7A6F}
.topic-url{width:100%;height:36px;border-radius:9px;border:1px solid rgba(20,41,31,.12);background:#FBF7EF;font-size:12px;color:#19241D;padding:0 11px;font-family:'Mulish',sans-serif;outline:none;margin-top:9px}
.topic-url:focus{border-color:rgba(201,168,76,.45)}

/* ─── KPI TIER ─── */
.tier-row{display:flex;align-items:center;gap:13px;padding:11px 0;border-bottom:1px solid rgba(20,41,31,.07)}
.tier-row:last-child{border-bottom:none}
.tier-bar{width:4px;height:30px;border-radius:3px;flex:none}
.tier-effect{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700}

/* ─── RING ─── */
.ring-wrap{position:relative;width:90px;height:90px;flex:none}
.ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:25px;font-weight:700;color:#F5EFDF}

/* ─── CHECK ─── */
.chk-item{display:flex;align-items:center;gap:13px;padding:14px 4px;border-bottom:1px solid rgba(20,41,31,.07);cursor:pointer}
.chk-item:last-child{border-bottom:none}
.chk-box{width:24px;height:24px;border-radius:7px;flex:none;display:flex;align-items:center;justify-content:center;transition:all .2s}
.chk-box.done{background:#5B9A6B;color:#fff;font-size:14px}
.chk-box.todo{border:2px solid rgba(20,41,31,.18)}

/* ─── SECTION ─── */
.sec{animation:fade .32s ease both}
</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-logo">
      <div class="sb-mark" onclick="toggleSidebar()"><span>R</span></div>
      <div class="sb-brand">
        <div class="sb-brand-name">RestoOne</div>
        <div class="sb-brand-sub">Admin</div>
      </div>
    </div>
    <nav class="sb-nav" id="sbNav"></nav>
    <div class="sb-footer">
      <div class="sb-user-row">
        <div class="sb-avatar" id="sbAvatar">RA</div>
        <div class="sb-user">
          <div class="sb-user-name" id="sbName">Admin</div>
          <div class="sb-user-sub" id="sbSub">Restoran admini</div>
        </div>
      </div>
      <div class="sb-logout" onclick="logout()">
        <svg class="sb-logout-icon" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span class="sb-logout-label">Chiqish</span>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <header class="topbar">
      <div class="tb-title-group">
        <span class="tb-num" id="tbNum">01</span>
        <div class="tb-info">
          <div class="tb-title" id="tbTitle">Boshqaruv paneli</div>
          <div class="tb-sub" id="tbSub">Yuklanmoqda…</div>
        </div>
      </div>
      <div class="tb-space"></div>
      <div class="tb-search">
        <div class="tb-search-ring"></div>
        <span>Qidirish…</span>
      </div>
      <button class="tb-bell" onclick="showToast('Yangi bildirishnomalar yo\'q','ok')">
        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        <div class="tb-dot"></div>
      </button>
    </header>
    <div class="content" id="content"></div>
  </main>
</div>

<!-- SLIDE-OVER -->
<div class="ov" id="slideOver" style="display:none">
  <div class="ov-bg" onclick="closePanel()"></div>
  <div class="panel">
    <div class="panel-hd">
      <div class="panel-hd-title">
        <span class="panel-hd-plus">+</span>
        <span class="panel-hd-text" id="panelTitle">Qo'shish</span>
      </div>
      <button class="panel-close" onclick="closePanel()">&times;</button>
    </div>
    <div class="panel-body" id="panelBody"></div>
  </div>
</div>

<!-- RESULT MODAL -->
<div class="modal-wrap" id="resultModal" style="display:none">
  <div class="modal-bg" onclick="closeModal()"></div>
  <div class="modal">
    <div class="modal-hd">

// ════════════ API ════════════
async function api(url, opts={}) {
  try {
    const r = await fetch(url, {credentials:'include', ...opts,
      headers:{'Content-Type':'application/json', ...(opts.headers||{})}});
    if (r.status === 401) { location.href = '/'; return null; }
    const data = await r.json();
    return data;
  } catch(e) { console.error(url, e); return null; }
}

// ════════════ INIT ════════════
async function init() {
  const me = await api('/api/auth/me');
  if (!me || me.role !== 'restaurant') { location.href = '/'; return; }

  const info = await api('/api/restaurant/info');
  S.info = info || {};
  const name = S.info.adminName || S.info.name || 'Admin';
  const rest = S.info.name || 'Restoran';
  document.getElementById('sbName').textContent = name;
  document.getElementById('sbSub').textContent = rest;
  document.getElementById('sbAvatar').textContent = name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('tbSub').textContent = rest + ' · trening tizimi';

  buildNav();
  await loadAll();
  renderSec();
}

async function loadAll() {
  const [menu, waiters, questions, days, ann, results] = await Promise.all([
    api('/api/restaurant/menu'),
    api('/api/restaurant/waiters'),
    api('/api/restaurant/questions'),
    api('/api/restaurant/testDays'),
    api('/api/restaurant/announcements'),
    api('/api/restaurant/results'),
  ]);
  S.menu = menu || [];
  S.waiters = waiters || [];
  S.questions = questions || [];
  S.testDays = days || [];
  S.announcements = ann || [];
  S.results = results || [];

  const tr = await api('/api/restaurant/training').catch(()=>null);
  S.training = tr || [];
}

// ════════════ NAV ════════════
function buildNav() {
  document.getElementById('sbNav').innerHTML = NAV.map(g=>`
    <div class="sb-group">

      ${g.items.map(it=>`
        <div class="sb-item ${S.sec===it.k?'active':''}" id="nav_${it.k}" onclick="setSec('${it.k}')">
          <div class="sb-bar"></div>
          <span class="sb-num">${it.n}</span>
          <span class="sb-label">${it.l}</span>
        </div>`).join('')}
    </div>`).join('');
}

function setSec(k) {
  S.sec = k;
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.remove('active'));
  const el = document.getElementById('nav_'+k);
  if (el) el.classList.add('active');
  document.getElementById('tbNum').textContent = INDICES[k]||'01';
  document.getElementById('tbTitle').textContent = TITLES[k]||k;
  renderSec();
}

function toggleSidebar() {
  S.collapsed = !S.collapsed;
  document.getElementById('sidebar').classList.toggle('collapsed', S.collapsed);
}

// ════════════ RENDER SECTION ════════════
function renderSec() {
  const c = document.getElementById('content');
  const k = S.sec;
  if (k==='dashboard') c.innerHTML = rDash();
  else if (k==='menyu') c.innerHTML = rMenu();
  else if (k==='ofitsiantlar') c.innerHTML = rWaiters();
  else if (k==='savollar') c.innerHTML = rQuestions();
  else if (k==='testkunlari') c.innerHTML = rCalendar();
  else if (k==='natijalar') c.innerHTML = rResults();
  else if (k==='elonlar') c.innerHTML = rAnn();
  else if (k==='kpi') c.innerHTML = rKpi();
  else if (k==='oquv') c.innerHTML = rOquv();
  else if (k==='checklist') c.innerHTML = rChecklist();
  else if (k==='adaptatsiya') c.innerHTML = rAdapt();

// ════════════ DASHBOARD ════════════
function rDash() {
  const cats = [...new Set(S.menu.map(m=>m.category))];

    {ghost:'M', label:'Menyu pozitsiyalari', sub:cats.length+' kategoriya', id:'sd_menu', val:S.menu.length},
    {ghost:'O', label:'Faol ofitsiantlar', sub:'Jami ro\'yxatda', id:'sd_wait', val:S.waiters.filter(w=>w.active!==false).length},
    {ghost:'S', label:'Savollar bazasi', sub:'Turli qiyinlikda', id:'sd_q', val:S.questions.length},

  ];

  const recent = S.results.slice().sort((a,b)=>new Date(b.submittedAt||b.date||0)-new Date(a.submittedAt||a.date||0)).slice(0,5);

    <div class="card" style="animation:fadeup .5s ease .33s both">
      <div class="card-hd"><span class="card-hd-n">/01</span><span class="card-hd-t">So'nggi natijalar</span></div>
      ${recent.length===0?'<div style="color:#6B7A6F;font-size:13px">Hali natija yo\'q</div>':
        recent.map(r=>{
          const sc=r.score||0;
          return `<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
            <span style="font-size:13px;font-weight:600;color:#19241D;width:88px;flex:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.waiterName||r.name||'–'}</span>
            <div class="prog" style="flex:1"><div class="prog-fill" style="width:${sc}%"></div></div>
            <span style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;width:36px;text-align:right;color:#19241D">${sc}</span>
          </div>`}).join('')}
    </div>

    <div class="card" style="animation:fadeup .5s ease .42s both">
      <div class="card-hd"><span class="card-hd-n">/02</span><span class="card-hd-t">Haftalik faollik</span></div>
      <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:8px;height:120px;padding-top:6px">
        ${week.map(w=>`
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end">
            <div style="width:100%;max-width:26px;height:${Math.max(8,Math.round(w.cnt/maxW*100))}%;border-radius:5px 5px 3px 3px;background:linear-gradient(180deg,#C9A84C,#9C7E2E);transform-origin:bottom;animation:grow .6s cubic-bezier(.2,.7,.3,1) both"></div>

      </div>

  ${lastAnn?`
  <div style="background:linear-gradient(120deg,#16291F,#1B3A2D);border-radius:18px;padding:26px 30px;display:flex;align-items:center;gap:24px;position:relative;overflow:hidden;animation:fadeup .5s ease .5s both">
    <div style="position:absolute;top:-24px;right:32px;font-family:'Cormorant Garamond',serif;font-size:130px;color:rgba(201,168,76,.07);line-height:1;pointer-events:none">07</div>
    <div style="flex:none;width:48px;height:48px;border-radius:12px;border:1px solid rgba(201,168,76,.35);display:flex;align-items:center;justify-content:center">
      <div style="width:13px;height:13px;border:2px solid #C9A84C;border-radius:3px;transform:rotate(45deg)"></div>

      <div style="font-size:13px;color:rgba(226,222,210,.62);line-height:1.6;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${lastAnn.content||lastAnn.text||''}</div>
    </div>
  </div>`:''}
</div>`;

let _raf;
function animateNums() {
  cancelAnimationFrame(_raf);
  const targets = {
    sd_menu: S.menu.length,
    sd_wait: S.waiters.filter(w=>w.active!==false).length,
    sd_q: S.questions.length,
    sd_cert: S.results.filter(r=>r.hasCertificate||(r.score||0)>=90).length,
    sd_today: S.results.filter(r=>(r.submittedAt||r.date||'').startsWith(new Date().toISOString().split('T')[0])).length,
  };
  const start = performance.now(), dur = 1100;
  const tick = now => {
    const p = Math.min(1,(now-start)/dur);
    const e = 1-Math.pow(1-p,3);
    Object.entries(targets).forEach(([id,v])=>{
      const el = document.getElementById(id);
      if (el) el.textContent = Math.round(v*e);
    });
    if (p<1) _raf = requestAnimationFrame(tick);
  };
  _raf = requestAnimationFrame(tick);
}

          ${!d.image?'<span style="font-size:10px;letter-spacing:1px;color:#6B7A6F;text-transform:uppercase;opacity:.6">[ rasm ]</span>':''}

        </div>
        <div style="padding:13px 15px 15px">
          <div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#C9A84C;font-weight:700;margin-bottom:3px">${d.category||''}</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:#19241D;line-height:1.15;margin-bottom:9px">${d.name}</div>
          <div style="display:flex;align-items:center;justify-content:space-between;gap:6px">

              <span style="font-size:12px;color:#6B7A6F;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:110px">${(d.allergens||[]).length>0?(d.allergens||[]).join(', '):'Allergensiz'}</span>
            </div>
            ${d.price?`<span style="font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:#19241D;white-space:nowrap">${Number(d.price).toLocaleString()} so'm</span>`:''}

async function toggleWaiter(id) {

  w.active = active; renderSec();
}

async function delWaiter(id) {
  if (!confirm('Ofitsiantni o\'chirish?')) return;
  await api('/api/restaurant/waiters/'+id, {method:'DELETE'});
  S.waiters = S.waiters.filter(w=>w.id!==id);
  renderSec(); showToast('O\'chirildi','ok');
}

function downloadCSVTemplate() {
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent('Ism,PIN\nJasur Rahimov,1234\n');
  a.download = 'ofitsiantlar_shablon.csv'; a.click();
}

async function importCSV(input) {
  const file = input.files[0]; if (!file) return;
  const text = await file.text();
  const rows = text.split('\n').slice(1).filter(r=>r.trim());
  let added = 0, errors = 0;
  for (const row of rows) {
    const [name, pin] = row.split(/[,;]/).map(s=>s.trim());
    if (!name || !/^\d{4}$/.test(pin)) { errors++; continue; }
    const res = await api('/api/restaurant/waiters', {method:'POST', body:JSON.stringify({name,pin})});
    if (res?.success && res.waiter) { S.waiters.push(res.waiter); added++; } else errors++;
  }
  renderSec();
  showToast(`${added} ta qo'shildi${errors?' · '+errors+' xato':''}`, added>0?'ok':'err');
}

  let items = S.questions.filter(q => S.qFilter==='all' || q.difficulty===S.qFilter);
  if (term) items = items.filter(q =>
    (q.question||q.text||'').toLowerCase().includes(term) ||
    (q.options||[]).some(o=>(o||'').toLowerCase().includes(term))
  );

  if (!items.length) {
    box.innerHTML = `<div style="text-align:center;padding:50px 20px;border:1.5px dashed rgba(20,41,31,.15);border-radius:18px">
      <div style="font-family:'Cormorant Garamond',serif;font-size:22px;color:#19241D;margin-bottom:6px">${term?'Hech narsa topilmadi':'Savollar yo\'q'}</div>
      <div style="font-size:12.5px;color:#6B7A6F">${term?'Qidiruv so\'zini o\'zgartirib ko\'ring':'Birinchi savolingizni qo\'shing'}</div>
    </div>`;
    return;
  }

  box.innerHTML = items.map((q,i)=>{
    const d = Q_DIFF[q.difficulty] || Q_DIFF.easy;
    const open = S.qExpandedId === q.id;
    return `<div class="card" style="padding:0;overflow:hidden;margin-bottom:10px;${open?'box-shadow:0 14px 32px -14px rgba(20,41,31,.18);border:1px solid rgba(201,168,76,.35);':''}animation:fadeup .4s ease ${Math.min(i*0.03,0.3)}s both">
      <div onclick="toggleQExpand('${q.id}')" style="display:flex;align-items:stretch;gap:14px;padding:0;cursor:pointer;min-height:56px">
        <div style="width:4px;flex:none;background:${d.color}"></div>
        <div style="flex:1;padding:14px 0;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <span style="flex:none;padding:4px 11px;border-radius:12px;background:${d.chipBg};color:${d.color};font-size:10px;font-weight:800;letter-spacing:.6px">${d.label.toUpperCase()}</span>
          <span style="flex:1;min-width:200px;font-size:13.5px;font-weight:600;color:#19241D;line-height:1.5">${esc(q.question||q.text||'')}</span>
        </div>
        <div style="flex:none;display:flex;align-items:center;gap:6px;padding-right:14px">

function rCalendar() {
  const MONTHS=['Yanvar','Fevral','Mart','Aprel','May','Iyun','Iyul','Avgust','Sentabr','Oktabr','Noyabr','Dekabr'];
  const DAYS=['Du','Se','Ch','Pa','Ju','Sh','Ya'];
  const now = new Date(new Date().getFullYear(), new Date().getMonth()+S.calOffset, 1);
  const yr = now.getFullYear(), mo = now.getMonth();
  const firstDay = (new Date(yr,mo,1).getDay()+6)%7;
  const daysInMo = new Date(yr,mo+1,0).getDate();
  const todayStr = new Date().toISOString().split('T')[0];

  const cells = [];
  for (let i=0;i<firstDay;i++) cells.push({blank:true});
  for (let d=1;d<=daysInMo;d++) {
    const key = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells.push({d, key, isTest:S.testDays.includes(key), isToday:key===todayStr});
  }

  const upcoming = S.testDays.filter(d=>d>=todayStr).sort().slice(0,5);

  return `<div class="sec">
  <div style="display:grid;grid-template-columns:1fr 270px;gap:18px;max-width:780px">
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <button onclick="S.calOffset--;renderSec()" style="width:36px;height:36px;border-radius:50%;border:1px solid rgba(20,41,31,.12);display:flex;align-items:center;justify-content:center;cursor:pointer;background:none;font-size:18px;color:#19241D">‹</button>
        <span style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:#19241D">${MONTHS[mo]} ${yr}</span>
        <button onclick="S.calOffset++;renderSec()" style="width:36px;height:36px;border-radius:50%;border:1px solid rgba(20,41,31,.12);display:flex;align-items:center;justify-content:center;cursor:pointer;background:none;font-size:18px;color:#19241D">›</button>
      </div>
      <div class="cal-g" style="margin-bottom:7px">
        ${DAYS.map(d=>`<div style="text-align:center;font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:#6B7A6F;font-weight:700;padding-bottom:4px">${d}</div>`).join('')}
      </div>
      <div class="cal-g">
        ${cells.map(c=>c.blank?'<div></div>':`
          <div class="cal-c ${c.isTest?'testday':'normal'} ${c.isToday?'today':''}" onclick="toggleTestDay('${c.key}')">${c.d}</div>`).join('')}
      </div>
      <div style="display:flex;gap:18px;margin-top:18px;padding-top:14px;border-top:1px solid rgba(20,41,31,.07)">
        <div style="display:flex;align-items:center;gap:7px"><div style="width:13px;height:13px;border-radius:4px;background:#14291F;border:1px solid #C9A84C"></div><span style="font-size:12.5px;color:#19241D">Test kuni</span></div>
        <div style="display:flex;align-items:center;gap:7px"><div style="width:13px;height:13px;border-radius:4px;background:#FBF7EF;border:1px solid rgba(20,41,31,.12)"></div><span style="font-size:12.5px;color:#6B7A6F">Oddiy kun</span></div>
      </div>
    </div>
    <div class="card">
      <div style="font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#6B7A6F;font-weight:700;margin-bottom:13px">Yaqinlashayotgan</div>
      ${upcoming.length===0?'<div style="font-size:13px;color:#6B7A6F">Belgilanmagan</div>':
        upcoming.map(d=>`
          <div style="display:flex;align-items:center;gap:9px;padding:10px 0;border-bottom:1px solid rgba(20,41,31,.07)">
            <div style="width:7px;height:7px;border-radius:50%;background:#C9A84C;flex:none"></div>
            <span style="font-size:13px;color:#19241D;font-weight:600">${d}</span>
          </div>`).join('')}
    </div>
  </div></div>`;
}

async function toggleTestDay(key) {
  const idx = S.testDays.indexOf(key);
  if (idx>=0) {
    S.testDays.splice(idx,1);
    await api('/api/restaurant/testDays', {method:'DELETE', body:JSON.stringify({date:key})});
    showToast('Test kuni bekor qilindi','ok');
  } else {
    S.testDays.push(key);
    await api('/api/restaurant/testDays', {method:'POST', body:JSON.stringify({date:key})});
    showToast('Test kuni belgilandi','ok');
  }
  renderSec();
}

function rResults() {
  const sorted = [...S.results].sort((a,b)=>{
    const va = S.sortKey==='score'?(a.score||0):S.sortKey==='name'?(a.waiterName||''):new Date(a.submittedAt||a.date||0);
    const vb = S.sortKey==='score'?(b.score||0):S.sortKey==='name'?(b.waiterName||''):new Date(b.submittedAt||b.date||0);
    return S.sortDir==='desc'?(vb>va?1:-1):(va>vb?1:-1);
  });
  const sort = k => `onclick="S.sortKey='${k}';S.sortDir=S.sortKey==='${k}'&&S.sortDir==='desc'?'asc':'desc';renderSec()"`;
  return `<div class="sec">
  <div class="tbl">
    <div class="tbl-hd" style="grid-template-columns:2fr 1fr 1.6fr 1fr 1fr">
      <div style="cursor:pointer" ${sort('name')}>Ofitsiant ⇅</div>
      <div style="cursor:pointer" ${sort('date')}>Sana ⇅</div>
      <div style="cursor:pointer" ${sort('score')}>Ball % ⇅</div>
      <div>Holat</div>
      <div style="text-align:right">Sertifikat</div>
    </div>
    ${sorted.length===0?'<div style="padding:22px;color:#6B7A6F;font-size:13px">Natijalar yo\'q</div>':
      sorted.map(r=>{
        const sc = r.score||0;
        const passed = sc>=70;
        const cert = r.hasCertificate||sc>=90;
        const date = (r.submittedAt||r.date||'').split('T')[0];
        const data = encodeURIComponent(JSON.stringify({waiterName:r.waiterName||r.name,score:sc,totalCorrect:r.totalCorrect,totalQuestions:r.totalQuestions,submittedAt:r.submittedAt||r.date,hasCertificate:cert}));
        return `<div class="tbl-row" style="grid-template-columns:2fr 1fr 1.6fr 1fr 1fr;cursor:pointer" onclick="openResultModal('${data}')">
          <div style="font-size:14px;font-weight:700;color:#19241D">${r.waiterName||r.name||'–'}</div>
          <div style="font-size:13px;color:#6B7A6F">${date}</div>
          <div style="display:flex;align-items:center;gap:9px">
            <div class="prog" style="flex:1;max-width:100px"><div class="prog-fill" style="width:${sc}%;animation:none"></div></div>
            <span style="font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:700;color:#19241D">${sc}</span>
          </div>
          <div><span class="pill ${passed?'pill-g':'pill-r'}">${passed?'O\'tdi':'O\'tmadi'}</span></div>
          <div style="text-align:right"><span style="color:${cert?'#C9A84C':'rgba(20,41,31,.15)'};font-size:20px">★</span></div>
        </div>`}).join('')}
  </div></div>`;

function openResultModal(data) {
  const r = JSON.parse(decodeURIComponent(data));

  const cert = r.hasCertificate||sc>=90;
  document.getElementById('mdScore').textContent = sc+'%';
  document.getElementById('mdEyebrow').textContent = 'Test natijasi · '+(r.submittedAt||'').split('T')[0];
  document.getElementById('mdTitle').textContent = r.waiterName||'–';
  document.getElementById('mdBody').innerHTML = `
    <div style="display:flex;gap:11px;margin-bottom:18px">
      <div style="flex:1;padding:16px;border-radius:13px;background:#FBF7EF;text-align:center">

        <div style="font-size:11px;color:#6B7A6F;margin-top:4px;font-weight:600">Umumiy ball</div>

      </div>

    ${cert?`<div style="display:flex;align-items:center;gap:12px;padding:14px 15px;border-radius:12px;background:rgba(201,168,76,.10);border:1px solid rgba(201,168,76,.25);margin-bottom:14px">
      <span style="color:#C9A84C;font-size:24px">★</span>
      <div><div style="font-size:14px;font-weight:800;color:#19241D">Sertifikat berildi</div><div style="font-size:12px;color:#6B7A6F">90% va yuqori natija uchun</div></div>
    </div>`:''}
    <button onclick="closeModal()" style="width:100%;padding:13px;border-radius:12px;background:#14291F;color:#F5EFDF;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:'Mulish',sans-serif">Yopish</button>

  document.getElementById('resultModal').style.display = 'flex';

async function saveKpiSettings() {
  const g = id => Number(document.getElementById('kpi-'+id)?.value);
  const body = {
    periodDays: g('periodDays'),
    masterMin: g('masterMin'), masterBonus: g('masterBonus'),
    proMin: g('proMin'), proBonus: g('proBonus'),
    goodMin: g('goodMin'), goodBonus: g('goodBonus'),
    warningMin: g('warningMin'), warningPenalty: g('warningPenalty'),
    penaltyMin: g('penaltyMin'), penaltyFine: g('penaltyFine'),
  };
  if (Object.values(body).some(v => Number.isNaN(v))) { showToast('Barcha maydonlarni to\'ldiring','err'); return; }
  if (!(body.masterMin > body.proMin && body.proMin > body.goodMin && body.goodMin > body.warningMin && body.warningMin > body.penaltyMin)) {
    showToast('Minimal ballar kamayib borishi kerak: MASTER > PRO > YAXSHI > OGOHLANTIRISH > JAZO','err'); return;
  }
  const res = await api('/api/restaurant/kpi-settings', { method:'PUT', body: JSON.stringify(body) });
  if (!res?.success) { showToast('Saqlashda xatolik','err'); return; }
  showToast('KPI sozlamalari saqlandi','ok');
  loadKpiSection();
}

function kpiShiftPeriod(dir) {
  S.kpiOffset = Math.max(0, (S.kpiOffset || 0) + dir);
  loadKpiSection();
}

async function downloadKpiPdf() {
  const data = await api('/api/restaurant/kpi?offset=' + (S.kpiOffset || 0));
  if (!data?.kpiList) { showToast('KPI ma\'lumotlari yuklanmadi','err'); return; }
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
    const W = doc.internal.pageSize.getWidth();

    doc.setFillColor(20,41,31); doc.rect(0,0,W,34,'F');
    doc.setTextColor(201,168,76); doc.setFontSize(15); doc.setFont('helvetica','bold');
    doc.text('KPI & MAOSH HISOBOTI', 14, 15);
    doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(226,222,210);
    doc.text(`${S.info?.name||''}  ·  Davr: ${data.periodLabel||''}  ·  ${new Date().toISOString().split('T')[0]}`, 14, 24);

    const cols = [
      {x:14,  w:9,  t:'No'},
      {x:23,  w:56, t:'Ofitsiant'},
      {x:79,  w:34, t:'Daraja'},
      {x:113, w:26, t:"O'rtacha %"},
      {x:139, w:20, t:'Testlar'},
      {x:159, w:37, t:'Bonus/Jarima %'},
    ];
    let y = 44;
    doc.setFillColor(245,240,232); doc.rect(14,y-5,182,8,'F');
    doc.setFontSize(8.5); doc.setFont('helvetica','bold'); doc.setTextColor(20,41,31);
    cols.forEach(c=>doc.text(c.t, c.x+1.5, y));
    y += 8;
    doc.setFont('helvetica','normal'); doc.setFontSize(9);
    data.kpiList.forEach((k,i)=>{
      if (y > 278) { doc.addPage(); y = 20; }
      if (i%2===1){ doc.setFillColor(250,247,240); doc.rect(14,y-5,182,8,'F'); }
      doc.setTextColor(40,50,44);
      doc.text(String(i+1), cols[0].x+1.5, y);
      doc.text((k.waiterName||'').slice(0,32), cols[1].x+1.5, y);
      doc.text(k.level==='nodata'?'-':(k.label||''), cols[2].x+1.5, y);
      doc.text(k.avg==null?'-':String(k.avg), cols[3].x+1.5, y);
      doc.text(String(k.testCount||0), cols[4].x+1.5, y);
      const p = k.level==='nodata' ? '-' : (k.penalty>0?'+'+k.penalty:String(k.penalty));
      if (k.penalty>0) doc.setTextColor(61,122,80); else if (k.penalty<0) doc.setTextColor(163,67,53);
      doc.text(p, cols[5].x+1.5, y);
      y += 8;
    });
    doc.setDrawColor(201,168,76); doc.setLineWidth(0.3); doc.line(14,282,196,282);
    doc.setFontSize(7); doc.setTextColor(150,140,120);
    doc.text('RestoOne platformasi tomonidan avtomatik tuzilgan', 14, 288);
    doc.save(`kpi-hisobot-${new Date().toISOString().split('T')[0]}.pdf`);
    showToast('PDF yuklab olindi','ok');
  } catch(e) { showToast('PDF xatosi: '+e.message,'err'); }
}

          <div class="topic-sub" contenteditable="true" data-placeholder="Izoh qo'shish..." onblur="updateTrainingDesc('${v.id}',this.textContent)" style="min-height:16px;margin-top:4px">${esc(v.description)}</div>
          <div style="display:flex;gap:6px;margin-top:10px">
            <span onclick="moveTrainingVideo('${v.id}',-1)" style="cursor:pointer;font-size:12px;color:#6B7A6F" title="Yuqoriga">↑</span>
            <span onclick="moveTrainingVideo('${v.id}',1)" style="cursor:pointer;font-size:12px;color:#6B7A6F" title="Pastga">↓</span>
            <span onclick="deleteTrainingVideo('${v.id}')" style="cursor:pointer;font-size:12px;color:#C25B4C;margin-left:auto">O'chirish</span>
          </div>
        </div>
      </div>`).join('')}
  </div></div>`;
}

function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function ytIdFrom(url) {
  const m = String(url||'').match(/(?:youtube\.com\/(?:watch\?v=|shorts\/|embed\/)|youtu\.be\/)([A-Za-z0-9_-]{6,20})/);
  return m ? m[1] : null;
}

async function addTrainingVideo() {
  const titleEl = document.getElementById('newTrainTitle');
  const descEl = document.getElementById('newTrainDesc');
  const fileEl = document.getElementById('newTrainFile');
  const ytEl = document.getElementById('newTrainYt');
  const statusEl = document.getElementById('trainUploadStatus');
  const title = titleEl.value.trim();
  const description = descEl.value.trim();
  const file = fileEl.files[0];
  const ytUrl = ytEl.value.trim();
  if (!title) { showToast('Sarlavha kiriting','err'); return; }
  if (!file && !ytUrl) { showToast('Video fayl tanlang yoki YouTube havola kiriting','err'); return; }
  if (ytUrl && !ytIdFrom(ytUrl)) { showToast('YouTube havolasi noto\'g\'ri','err'); return; }

  statusEl.textContent = file ? 'Yuklanmoqda... (video hajmiga qarab 1-2 daqiqa olishi mumkin, sahifani yopmang)' : 'Saqlanmoqda...';
  const fd = new FormData();
  fd.append('title', title);
  fd.append('description', description);
  if (file) fd.append('video', file);
  else fd.append('youtubeUrl', ytUrl);
  try {
    const r = await fetch('/api/restaurant/training', { method:'POST', credentials:'include', body: fd });
    const res = await r.json();
    if (!r.ok) { showToast(res?.error||'Xatolik','err'); statusEl.textContent=''; return; }
    S.training.push(res);
    titleEl.value = ''; descEl.value = ''; fileEl.value = ''; ytEl.value = '';
    statusEl.textContent = '';
    showToast('Video qo\'shildi','ok');
    renderSec();
  } catch(e) { showToast('Yuklashda xatolik','err'); statusEl.textContent=''; }
}

async function renameTrainingVideo(id, title) {
  title = (title||'').trim();
  if (!title) return;
  await api('/api/restaurant/training/'+id, {method:'PUT', body:JSON.stringify({title})});
  const v = S.training.find(t=>t.id===id);
  if (v) v.title = title;
}

async function updateTrainingDesc(id, description) {
  description = (description||'').trim();
  await api('/api/restaurant/training/'+id, {method:'PUT', body:JSON.stringify({description})});
  const v = S.training.find(t=>t.id===id);
  if (v) v.description = description;
}

async function deleteTrainingVideo(id) {
  if (!confirm('Bu videoni o\'chirmoqchimisiz?')) return;
  await api('/api/restaurant/training/'+id, {method:'DELETE'});
  S.training = S.training.filter(t=>t.id!==id);
  renderSec();
  showToast('O\'chirildi','ok');
}

async function moveTrainingVideo(id, dir) {
  const vids = S.training.slice().sort((a,b)=>(a.order||0)-(b.order||0));
  const i = vids.findIndex(v=>v.id===id);
  const j = i + dir;
  if (i<0 || j<0 || j>=vids.length) return;
  const a = vids[i], b = vids[j];
  const aOrder = a.order||0, bOrder = b.order||0;
  a.order = bOrder; b.order = aOrder;
  await Promise.all([
    api('/api/restaurant/training/'+a.id, {method:'PUT', body:JSON.stringify({order:a.order})}),
    api('/api/restaurant/training/'+b.id, {method:'PUT', body:JSON.stringify({order:b.order})}),
  ]);
  renderSec();
}

function compressToB64(file, maxPx, cb) {
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    const r = Math.min(maxPx/img.width, maxPx/img.height, 1);
    canvas.width = img.width*r; canvas.height = img.height*r;
    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
    cb(canvas.toDataURL('image/jpeg', 0.8));
  };
  img.src = URL.createObjectURL(file);
}

              ${d.required?'<span style="display:inline-block;margin-top:3px;padding:2px 8px;border-radius:10px;background:rgba(194,91,76,.12);color:#A34335;font-size:9.5px;font-weight:800;letter-spacing:.4px">MAJBURIY</span>':''}
              <div style="font-size:11.5px;color:#6B7A6F;margin-top:5px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${esc((d.content||'').slice(0,120))||'Matn kiritilmagan'}</div>
            </div>
          </div>
          <div style="display:flex;gap:11px;margin-top:11px;font-size:11.5px;font-weight:700">
            <span onclick="S.adaptEditId='${d.id}';renderAdaptBody()" style="cursor:pointer;color:#9A7D2F">Tahrirlash</span>
            <span onclick="deleteAdaptDoc('${d.id}')" style="cursor:pointer;color:#C25B4C">O'chirish</span>
          </div>
        </div>`).join('')}
    </div>`}
  </div>`;
}

// ── TAB 4: Boshqaruv jamoasi ──
function adaptMgmt() {
  const mgmt = (S.adapt?.management||[]).slice().sort((a,b)=>(a.order||0)-(b.order||0));
  const photoCircle = (p, size) => p.photo
    ? `<img src="${p.photo}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;display:block;margin:0 auto 12px;border:1px solid rgba(201,168,76,.3)">`

  return `<div>
    <div class="card" style="margin-bottom:18px;max-width:480px">
      <div style="font-size:12.5px;font-weight:800;color:#19241D;margin-bottom:10px">+ Jamoa a'zosini qo'shish</div>
      <div id="mg-photo-preview" style="margin-bottom:10px">${window._mgPhoto?`<img src="${window._mgPhoto}" style="width:64px;height:64px;border-radius:50%;object-fit:cover">`:''}</div>
      <input type="file" id="mg-photo-file" accept="image/*" style="display:none" onchange="previewMgPhoto(this)">
      <button onclick="adSel('mg-photo-file').click()" style="${AD_BTN2};margin-bottom:10px">📷 Rasm tanlash (ixtiyoriy)</button>
      <input id="mg-name" placeholder="Ism familiya" style="${AD_INP};margin-bottom:9px">
      <input id="mg-position" placeholder="Lavozim (masalan: Servis menejeri)" style="${AD_INP};margin-bottom:9px">
      <input id="mg-phone" placeholder="Telefon (ixtiyoriy)" style="${AD_INP};margin-bottom:11px">
      <button onclick="addMgmtMember()" style="${AD_BTN}">Qo'shish</button>
    </div>
    ${!mgmt.length ? '<div style="color:#6B7A6F;font-size:13px;text-align:center;padding:20px">Hozircha jamoa a\'zolari kiritilmagan.</div>' : `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:13px">
      ${mgmt.map(p=> S.adaptEditId===p.id ? `
        <div class="card" style="grid-column:1/-1;max-width:480px;border:1.5px solid rgba(201,168,76,.5)">
          <div style="margin-bottom:10px">${window._mgPhotoEdit!==undefined ? (window._mgPhotoEdit?`<img src="${window._mgPhotoEdit}" style="width:64px;height:64px;border-radius:50%;object-fit:cover">`:'') : (p.photo?`<img src="${p.photo}" style="width:64px;height:64px;border-radius:50%;object-fit:cover">`:'')}</div>
          <input type="file" id="em-photo-file" accept="image/*" style="display:none" onchange="previewMgPhotoEdit(this)">
          <button onclick="adSel('em-photo-file').click()" style="${AD_BTN2};margin-bottom:10px">📷 Rasmni almashtirish</button>
          <input id="em-name" value="${esc(p.name||'')}" placeholder="Ism" style="${AD_INP};margin-bottom:9px">
          <input id="em-position" value="${esc(p.position||'')}" placeholder="Lavozim" style="${AD_INP};margin-bottom:9px">
          <input id="em-phone" value="${esc(p.phone||'')}" placeholder="Telefon" style="${AD_INP};margin-bottom:11px">
          <div style="display:flex;gap:8px"><button onclick="saveMgmtMember('${p.id}')" style="${AD_BTN}">Saqlash</button><button onclick="S.adaptEditId=null;window._mgPhotoEdit=undefined;renderAdaptBody()" style="${AD_BTN2}">Bekor</button></div>
        </div>` : `
        <div class="card" style="text-align:center">
          ${photoCircle(p, 70)}
          <div style="font-size:15px;font-weight:700;color:#19241D">${esc(p.name)}</div>
          <div style="font-size:12.5px;color:#C9A84C;font-weight:600;margin-top:2px">${esc(p.position)}</div>
          ${p.phone?`<div style="font-size:11.5px;color:#6B7A6F;margin-top:4px">${esc(p.phone)}</div>`:''}
          <div style="display:flex;gap:11px;justify-content:center;margin-top:11px;font-size:11.5px;font-weight:700">
            <span onclick="S.adaptEditId='${p.id}';window._mgPhotoEdit=undefined;renderAdaptBody()" style="cursor:pointer;color:#9A7D2F">Tahrirlash</span>
            <span onclick="deleteMgmtMember('${p.id}')" style="cursor:pointer;color:#C25B4C">O'chirish</span>
          </div>
        </div>`).join('')}
    </div>`}
  </div>`;
}

function previewMgPhoto(input) {
  const file = input.files[0]; if (!file) return;
  compressToB64(file, 400, b64 => { window._mgPhoto = b64; renderAdaptBody(); });
}
function previewMgPhotoEdit(input) {
  const file = input.files[0]; if (!file) return;
  compressToB64(file, 400, b64 => { window._mgPhotoEdit = b64; renderAdaptBody(); });
}

async function addMgmtMember() {

  showToast('Qo\'shildi','ok');

  loadAdaptSection();

// ════════════ PANEL (SLIDE-OVER) ════════════
function openPanel() { document.getElementById('slideOver').style.display='flex'; }
function closePanel() { document.getElementById('slideOver').style.display='none'; window._dishImg=null; }

// DISH FORM
function openDishForm(id) {
  const dish = id ? S.menu.find(m=>m.id===id) : null;
  document.getElementById('panelTitle').textContent = dish ? 'Taomni tahrirlash' : 'Taom qo\'shish';
  const ALRG = ['Gluten','Sut','Tuxum','Soya','Baliq','Dengiz mahsulotlari','Yong\'oq','Selderey'];
  const active = dish?.allergens||[];
  document.getElementById('panelBody').innerHTML = `
    <div class="img-up" id="imgUpDiv" onclick="document.getElementById('imgInput').click()">
      ${dish?.image?`<img src="${dish.image}">`:'<span class="img-up-lbl">+ rasm yuklash (ixtiyoriy)</span>'}
    </div>
    <input type="file" id="imgInput" accept="image/*" style="display:none" onchange="previewImg(this)">
    <div class="f-row"><label class="f-label">Taom nomi *</label><input class="f-input" id="dName" value="${dish?.name||''}"></div>
    <div class="f-row"><label class="f-label">Kategoriya *</label><input class="f-input" id="dCat" value="${dish?.category||''}" placeholder="Issiq taomlar, Salatlar…"></div>
    <div class="f-row"><label class="f-label">Tavsif</label><textarea class="f-area" id="dDesc">${dish?.description||''}</textarea></div>
    <div class="f-row"><label class="f-label">Narx (so'm)</label><input class="f-input" id="dPrice" type="number" value="${dish?.price||''}"></div>
    <div class="f-row"><label class="f-label">Tarkib (vergul bilan)</label><input class="f-input" id="dIngr" value="${(dish?.ingredients||[]).join(', ')}"></div>
    <div class="f-row"><label class="f-label">Tavsiya yo'riqnomasi</label><textarea class="f-area" id="dServ">${dish?.servingSuggestion||''}</textarea></div>
    <div class="f-row">
      <label class="f-label">Allergenlar</label>
      <div class="ach">${ALRG.map(a=>`<div class="ac ${active.includes(a)?'active':''}" onclick="this.classList.toggle('active')" data-a="${a}">${a}</div>`).join('')}</div>
    </div>
    <div class="f-actions">
      <button class="btn-outline" style="flex:1" onclick="closePanel()">Bekor</button>
      <button class="btn-gold" style="flex:1.4" onclick="saveDish('${id||''}')">Saqlash</button>
    </div>`;
  openPanel();
}

function previewImg(input) {
  const file = input.files[0]; if (!file) return;
  const canvas = document.createElement('canvas');
  const img = new Image();
  img.onload = () => {
    const MAX=800, r=Math.min(MAX/img.width,MAX/img.height,1);
    canvas.width=img.width*r; canvas.height=img.height*r;
    canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
    const b64 = canvas.toDataURL('image/jpeg',0.8);
    document.getElementById('imgUpDiv').innerHTML = `<img src="${b64}">`;
    window._dishImg = b64;
  };
  img.src = URL.createObjectURL(file);
}

async function saveDish(id) {
  const name=document.getElementById('dName').value.trim();
  const category=document.getElementById('dCat').value.trim();
  if (!name||!category) { showToast('Ism va kategoriya majburiy','err'); return; }
  const allergens=[...document.querySelectorAll('.ac.active')].map(el=>el.dataset.a);
  const body={name,category,
    description:document.getElementById('dDesc').value.trim(),
    price:document.getElementById('dPrice').value,
    ingredients:document.getElementById('dIngr').value.split(',').map(s=>s.trim()).filter(Boolean),
    allergens, servingSuggestion:document.getElementById('dServ').value.trim(),
  };
  if (window._dishImg) { body.imageBase64=window._dishImg; window._dishImg=null; }
  if (id) {
    await api('/api/restaurant/menu/'+id, {method:'PUT', body:JSON.stringify(body)});
    const idx=S.menu.findIndex(m=>m.id===id);
    if (idx>=0) Object.assign(S.menu[idx],body);
    showToast('Yangilandi','ok');
  } else {
    const res = await api('/api/restaurant/menu', {method:'POST', body:JSON.stringify(body)});
    if (res?.item) S.menu.push(res.item);
    else if (res?.menu) S.menu = res.menu;
    showToast('Taom qo\'shildi','ok');
  }
  closePanel(); renderSec();
}

// WAITER FORM
let _wActive = true;
function openWaiterForm(id) {
  const w = id ? S.waiters.find(x=>x.id===id) : null;
  _wActive = !w || w.active!==false;
  document.getElementById('panelTitle').textContent = w ? 'Ofitsiantni tahrirlash' : 'Ofitsiant qo\'shish';
  document.getElementById('panelBody').innerHTML = `
    <div class="f-row"><label class="f-label">Ism familiya *</label><input class="f-input" id="wName" value="${w?.name||''}"></div>
    <div class="f-row"><label class="f-label">4 raqamli PIN *</label><input class="f-input" id="wPin" type="text" maxlength="4" value="${w?.pin||''}" placeholder="1234" style="letter-spacing:5px;font-family:monospace"></div>
    <div class="f-row">
      <label class="f-label">Holat</label>
      <div style="display:flex;gap:8px">
        <div id="wOn" onclick="setWActive(true)" style="flex:1;text-align:center;padding:11px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;transition:all .2s;${_wActive?'background:#14291F;color:#C9A84C':'border:1px solid rgba(20,41,31,.12);color:#6B7A6F'}">Faol</div>
        <div id="wOff" onclick="setWActive(false)" style="flex:1;text-align:center;padding:11px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;transition:all .2s;${!_wActive?'background:#14291F;color:#C9A84C':'border:1px solid rgba(20,41,31,.12);color:#6B7A6F'}">Nofaol</div>
      </div>
    </div>
    <div class="f-actions">
      <button class="btn-outline" style="flex:1" onclick="closePanel()">Bekor</button>
      <button class="btn-gold" style="flex:1.4" onclick="saveWaiter('${id||''}')">Saqlash</button>
    </div>`;
  openPanel();
}

function setWActive(v) {
  _wActive = v;
  document.getElementById('wOn').style.cssText = v?'flex:1;text-align:center;padding:11px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;background:#14291F;color:#C9A84C':'flex:1;text-align:center;padding:11px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;border:1px solid rgba(20,41,31,.12);color:#6B7A6F';
  document.getElementById('wOff').style.cssText = !v?'flex:1;text-align:center;padding:11px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;background:#14291F;color:#C9A84C':'flex:1;text-align:center;padding:11px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;border:1px solid rgba(20,41,31,.12);color:#6B7A6F';
}

async function saveWaiter(id) {
  const name=document.getElementById('wName').value.trim();
  const pin=document.getElementById('wPin').value.trim();
  if (!name) { showToast('Ism majburiy','err'); return; }
  if (!id && !/^\d{4}$/.test(pin)) { showToast('4 raqamli PIN kiriting','err'); return; }
  if (id) {
    const body={name,active:_wActive};
    if (pin && /^\d{4}$/.test(pin)) body.pin=pin;
    await api('/api/restaurant/waiters/'+id, {method:'PUT', body:JSON.stringify(body)});
    const w=S.waiters.find(x=>x.id===id);
    if (w) {w.name=name;w.active=_wActive;if(pin)w.pin=pin;}
    showToast('Yangilandi','ok');
  } else {
    const res=await api('/api/restaurant/waiters', {method:'POST', body:JSON.stringify({name,pin,active:_wActive})});
    if (res?.success&&res.waiter) S.waiters.push(res.waiter);
    else if (res?.error) { showToast(res.error,'err'); return; }
    showToast('Ofitsiant qo\'shildi','ok');
  }
  closePanel(); renderSec();
}

// QUESTION FORM
let _qDiff='easy', _qCorrect=0;
function openQForm(id) {
  const q = id ? S.questions.find(x=>x.id===id) : null;
  _qDiff = q?.difficulty||'easy';
  _qCorrect = q?.correctAnswer??0;
  document.getElementById('panelTitle').textContent = q ? 'Savolni tahrirlash' : 'Savol qo\'shish';
  const opts = q?.options||['','','',''];
  document.getElementById('panelBody').innerHTML = `
    <div class="f-row"><label class="f-label">Savol matni *</label><textarea class="f-area" id="qText">${esc(q?.question||q?.text||'')}</textarea></div>
    <div class="f-row">
      <label class="f-label">Javob variantlari (to'g'risini belgilang)</label>
      ${opts.map((o,i)=>`
        <div class="ans-row">
          <button class="a-radio ${i===_qCorrect?'ok':''}" id="ar${i}" onclick="selectAns(${i})"></button>
          <input class="f-input" id="ao${i}" value="${esc(o)}" placeholder="${i+1}-variant">
        </div>`).join('')}
    </div>
    <div class="f-row">
      <label class="f-label">Qiyinlik darajasi</label>
      <div class="diff-g">
        <div class="diff-b easy ${_qDiff==='easy'?'on':''}" onclick="selDiff('easy')">Oson</div>
        <div class="diff-b medium ${_qDiff==='medium'?'on':''}" onclick="selDiff('medium')">O'rta</div>
        <div class="diff-b hard ${_qDiff==='hard'?'on':''}" onclick="selDiff('hard')">Qiyin</div>
      </div>
    </div>
    <div class="f-row"><label class="f-label">Izoh — xato javob berganda ko'rsatiladi (nega aynan shu javob to'g'ri)</label><textarea class="f-area" id="qExpl" style="min-height:70px" placeholder="Masalan: Sezar tarkibida toster non bor — shuning uchun glutenli">${esc(q?.explanation||'')}</textarea></div>
    <div class="f-actions">
      <button class="btn-outline" style="flex:1" onclick="closePanel()">Bekor</button>
      <button class="btn-gold" style="flex:1.4" onclick="saveQ('${id||''}')">Saqlash</button>
    </div>`;
  openPanel();
}

function selectAns(i) {
  _qCorrect=i;
  document.querySelectorAll('.a-radio').forEach((el,idx)=>{
    el.classList.toggle('ok',idx===i);
  });
}
function selDiff(d) {
  _qDiff=d;
  document.querySelectorAll('.diff-b').forEach(el=>el.classList.remove('on'));
  document.querySelector('.diff-b.'+d)?.classList.add('on');
}

async function saveQ(id) {
  const text=document.getElementById('qText').value.trim();
  if (!text) { showToast('Savol matni majburiy','err'); return; }
  const options=[0,1,2,3].map(i=>document.getElementById('ao'+i)?.value?.trim()||'');
  if (options.some(o=>!o)) { showToast('Barcha variantlarni to\'ldiring','err'); return; }
  const body={question:text,options,correctAnswer:_qCorrect,difficulty:_qDiff,explanation:document.getElementById('qExpl')?.value?.trim()||''};
  if (id) {
    await api('/api/restaurant/questions/'+id, {method:'PUT', body:JSON.stringify(body)});
    const q=S.questions.find(x=>x.id===id);
    if (q) Object.assign(q,body);
    showToast('Savol yangilandi','ok');
  } else {
    const res=await api('/api/restaurant/questions', {method:'POST', body:JSON.stringify(body)});
    if (res?.question) S.questions.push(res.question);
    else if (res?.id) S.questions.push({...body,...res});
    showToast('Savol qo\'shildi','ok');
  }
  closePanel(); renderSec();
}

// ANN FORM
function openAnnForm() {
  document.getElementById('panelTitle').textContent = 'E\'lon qo\'shish';
  document.getElementById('panelBody').innerHTML = `
    <div class="f-row"><label class="f-label">Sarlavha *</label><input class="f-input" id="annTitle"></div>
    <div class="f-row"><label class="f-label">Matn *</label><textarea class="f-area" id="annText" style="min-height:110px"></textarea></div>
    <div class="f-actions">
      <button class="btn-outline" style="flex:1" onclick="closePanel()">Bekor</button>
      <button class="btn-gold" style="flex:1.4" onclick="saveAnn()">Saqlash</button>
    </div>`;
  openPanel();
}

async function saveAnn() {
  const title=document.getElementById('annTitle').value.trim();
  const content=document.getElementById('annText').value.trim();
  if (!title||!content) { showToast('Sarlavha va matn majburiy','err'); return; }
  const res=await api('/api/restaurant/announcements', {method:'POST', body:JSON.stringify({title,content})});
  if (res?.announcement) S.announcements.unshift(res.announcement);
  else if (res?.id) S.announcements.unshift({...res,title,content});
  showToast('E\'lon qo\'shildi','ok');
  closePanel(); renderSec();
}

// ════════════ TOAST ════════════
function showToast(msg, type='ok') {
  const wrap=document.getElementById('toastWrap');
  const t=document.createElement('div');
  t.className='toast '+(type==='ok'?'t-ok':'t-err');
  t.innerHTML=`<span>${type==='ok'?'✓':'!'}</span><span>${msg}</span>`;
  wrap.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .4s';setTimeout(()=>t.remove(),400);},3000);
}

// ════════════ LOGOUT ════════════
async function logout() {
  await api('/api/auth/logout', {method:'POST'});
  location.href = '/';
}
