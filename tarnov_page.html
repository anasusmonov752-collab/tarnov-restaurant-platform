ам.\n\n🍴 У нас вы найдёте:\n- ароматный лагман по-уйгурски,\n- сытные и нежные манты,\n- сочные шашлыки и мангал-ассорти,\n- национальные блюда: плов, шурпа, самса,\n- свежие салаты и закуски, а также десерты и напитки.\n\nМы гордимся тем, что Tarnov стал для многих жителей и гостей Ташкента любимым местом для встреч с семьёй и друзьями. У нас всегда уютная атмосфера, внимательное обслуживание и щедрые порции по доступным ценам.\n\n🚚 Доставка по Ташкенту\nНе хотите выходить из дома? Мы доставим ваши любимые блюда быстро и удобно — прямо к вашему столу. Tarnov имеет филиалы в Себзаре, на Дружбе Народов и в Келес, а также принимает онлайн-заказы.\n\n✨ Почему выбирают Tarnov:\n- более 20 лет на рынке — нам доверяют тысячи гостей,\n- разнообразное меню для всей семьи,\n- вкус, проверенный временем,\n- быстрая доставка и удобная оплата.\n\nЗакажите онлайн или приходите в один из наших ресторанов — Tarnov ждёт вас, чтобы подарить вкус настоящей восточной кухни в сердце Ташкента!"])</script><script>self.__next_f.push([1,"2c:[\"$\",\"$L2e\",null,{\"mt\":10,\"children\":[[\"$\",\"$L2f\",null,{\"mb\":10}],[\"$\",\"$L20\",null,{\"as\":\"h1\",\"fontSize\":\"4xl\",\"fontWeight\":700,\"mb\":10,\"children\":\"Tarnov в Ташкенте\"}],[\"$\",\"$L20\",null,{\"whiteSpace\":\"pre-wrap\",\"children\":\"$30\"}]]}]\n"])</script><script>self.__next_f.push([1,"31:I[96890,[\"2876\",\"static/chunks/c0ac4b97-6e24a4e54080d533.js\",\"6454\",\"static/chunks/6454-d8f9553ed070bac9.js\",\"3845\",\"static/chunks/3845-d00ce4020277a754.js\",\"8195\",\"static/chunks/8195-f79373f9c6968d34.js\",\"8256\",\"static/chunks/8256-b2dd9e7d4083c837.js\",\"9088\",\"static/chunks/9088-3ae5452e159a15c8.js\",\"7274\",\"static/chunks/7274-f637a07394667d8c.js\",\"1777\",\"static/chunks/1777-3d1b24ef2ba03019.js\",\"7505\",\"static/chunks/7505-7ebc1a09128ae9bf.js\",\"4288\",\"static/chunks/4288-5e5fb9f0e308d71e.js\",\"7167\",\"static/chunks/7167-eb33f611cec06c0f.js\",\"3171\",\"static/chunks/3171-65fbe1c1268a109d.js\",\"70
