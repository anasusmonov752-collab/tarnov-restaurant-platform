<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarnov Restaurant — Kirish</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .ornament { color: var(--gold); opacity: 0.6; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span { color: var(--text3); font-size: 0.75rem; }
  </style>
</head>
<body>
  <div id="toast-container"></div>
  <div class="login-page">
    <div class="login-container">

      <div class="login-logo">
        <svg class="logo-svg" width="110" height="110" viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Outer ring -->
          <circle cx="55" cy="55" r="53" stroke="#C8922A" stroke-width="1.5"/>
          <circle cx="55" cy="55" r="47" stroke="#C8922A" stroke-width="0.5" opacity="0.5"/>
          <!-- Inner decorative ring -->
          <circle cx="55" cy="55" r="40" stroke="#C8922A" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.35"/>
          <!-- Cardinal ornaments -->
          <polygon points="55,5 57.5,13 55,11 52.5,13" fill="#C8922A"/>
          <polygon points="55,105 57.5,97 55,99 52.5,97" fill="#C8922A"/>
          <polygon points="5,55 13,57.5 11,55 13,52.5" fill="#C8922A"/>
          <polygon points="105,55 97,57.5 99,55 97,52.5" fill="#C8922A"/>
          <!-- Corner dots -->
          <circle cx="55" cy="16" r="2" fill="#C8922A"/>
          <circle cx="55" cy="94" r="2" fill="#C8922A"/>
          <circle cx="16" cy="55" r="2" fill="#C8922A"/>
          <circle cx="94" cy="55" r="2" fill="#C8922A"/>
          <!-- Gold plate background -->
          <circle cx="55" cy="55" r="34" fill="#C8922A" opacity="0.08"/>
          <!-- Fork & knife icon -->
          <g transform="translate(29, 28)" stroke="#C8922A" stroke-width="1.6" stroke-linecap="round" fill="none">
            <!-- Fork -->
            <line x1="10" y1="4" x2="10" y2="22"/>
            <line x1="7"  y1="4" x2="7"  y2="11"/>
            <line x1="10" y1="4" x2="7"  y2="4"/>
            <line x1="13" y1="4" x2="13" y2="11"/>
            <line x1="10" y1="4" x2="13" y2="4"/>
            <line x1="7"  y1="11" x2="13" y2="11"/>
            <!-- Knife -->
            <line x1="43" y1="4"  x2="43" y2="22"/>
            <path d="M43 4 Q49 8 43 14" fill="#C8922A" fill-opacity="0.15" stroke="#C8922A" stroke-width="1.4"/>
          </g>
          <!-- TARNOV text -->
          <text x="55" y="69" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
                font-size="13" font-weight="bold" fill="#C8922A" letter-spacing="4">TARNOV</text>
          <!-- Bottom line decoration -->
          <line x1="30" y1="74" x2="80" y2="74" stroke="#C8922A" stroke-width="0.6" opacity="0.6"/>
          <!-- RESTAURANT small text -->
          <text x="55" y="83" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
                font-size="6.5" fill="#C8922A" letter-spacing="3" opacity="0.8">RESTAURANT</text>
        </svg>
        <h1>TARNOV</h1>
        <p>Restaurant · Training Platform</p>
      </div>

      <div class="login-card">
        <div class="login-tabs">
          <button class="login-tab active" onclick="switchTab('superadmin')">⚡ Super Admin</button>
          <button class="login-tab" onclick="switchTab('restaurant')">🏪 Admin</button>
          <button class="login-tab" onclick="switchTab('waiter')">👨‍🍳 Ofitsiant</button>
        </div>

        <!-- Super Admin -->
        <div class="tab-panel active" id="panel-superadmin">
          <div class="form-group">
            <label>Email manzil</label>
            <input type="email" class="form-control" id="sa-email" placeholder="admin@tarnov.uz">
          </div>
          <div class="form-group">
            <label>Parol</label>
            <input type="password" class="form-control" id="sa-password" placeholder="••••••••">
          </div>
          <button class="btn btn-gold btn-full btn-lg" onclick="login('superadmin')">
            Kirish
          </button>
        </div>

        <!-- Restaurant Admin -->
        <div class="tab-panel" id="panel-restaurant">
          <div class="form-group">
            <label>Email manzil</label>
            <input type="email" class="form-control" id="ra-email" placeholder="admin@restaurant.uz">
          </div>
          <div class="form-group">
            <label>Parol</label>
            <input type="password" class="form-control" id="ra-password" placeholder="••••••••">
          </div>
          <button class="btn btn-gold btn-full btn-lg" onclick="login('restaurant')">
            Kirish
          </button>
        </div>

        <!-- Waiter -->
        <div class="tab-panel" id="panel-waiter">
          <div class="form-group">
            <label>Restoranni tanlang</label>
            <select class="form-control" id="w-restaurant">
              <option value="">— Restoran tanlang —</option>
            </select>
          </div>
          <div class="form-group">
            <label>4 xonali PIN</label>
            <input type="password" class="form-control pin-input" id="w-pin" placeholder="• • • •" maxlength="4" inputmode="numeric" pattern="\d{4}">
          </div>
          <button class="btn btn-gold btn-full btn-lg" onclick="login('waiter')">
            Kirish
          </button>
        </div>

        <div id="login-error" class="alert alert-danger" style="display:none;margin-top:16px"></div>
      </div>

      <p style="text-align:center;margin-top:24px;font-size:0.75rem;color:var(--text3)">
        ✦ Tarnov Restaurant HR Training Platform ✦
      </p>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script>
    const tabs = document.querySelectorAll('.login-tab');

    function switchTab(type) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      tabs.forEach(t => t.classList.remove('active'));
      document.getElementById(`panel-${type}`).classList.add('active');
      event.target.classList.add('active');
      document.getElementById('login-error').style.display = 'none';
      if (type === 'waiter') loadRestaurants();
    }

    async function loadRestaurants() {
      try {
        const list = await api('/api/restaurants/list');
        const sel = document.getElementById('w-restaurant');
        sel.innerHTML = '<option value="">— Restoran tanlang —</option>';
        list.forEach(r => {
          const opt = document.createElement('option');
          opt.value = r.id;
          opt.textContent = r.name + (r.location ? ` — ${r.location}` : '');
          sel.appendChild(opt);
        });
      } catch {}
    }

    async function login(type) {
      const errEl = document.getElementById('login-error');
      errEl.style.display = 'none';
      let body = { loginType: type };

      if (type === 'superadmin') {
        body.email = document.getElementById('sa-email').value.trim();
        body.password = document.getElementById('sa-password').value;
      } else if (type === 'restaurant') {
        body.email = document.getElementById('ra-email').value.trim();
        body.password = document.getElementById('ra-password').value;
      } else {
        body.restaurantId = document.getElementById('w-restaurant').value;
        body.pin = document.getElementById('w-pin').value;
      }

      try {
        const res = await api('/api/auth/login', { method: 'POST', body: JSON.stringify(body) });
        window.location.href = res.redirect;
      } catch (e) {
        errEl.textContent = e.message || 'Kirish amalga oshmadi';
        errEl.style.display = 'flex';
      }
    }

    // Enter key support
    document.addEventListener('keypress', e => {
      if (e.key === 'Enter') {
        const active = document.querySelector('.tab-panel.active');
        const type = active.id.replace('panel-', '');
        login(type);
      }
    });

    // Check if already logged in
    api('/api/auth/me').then(user => {
      if (user.role === 'superadmin') window.location.href = '/super-admin.html';
      else if (user.role === 'restaurant') window.location.href = '/restaurant-admin.html';
      else if (user.role === 'waiter') window.location.href = '/waiter.html';
    }).catch(() => {});
  </script>
</body>
</html>
