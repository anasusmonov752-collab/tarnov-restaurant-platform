<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RestoPro — Super Admin</title>
  <link rel="stylesheet" href="/css/style.css?v=3.1">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div id="toast-container"></div>

<div class="mobile-topbar">
  <button class="hamburger" onclick="toggleSidebar()">
    <i data-lucide="menu"></i>
  </button>
  <div style="display:flex;align-items:center;gap:7px">
    <div style="width:24px;height:24px;background:linear-gradient(135deg,#00D4FF,#0099CC);border-radius:6px;display:flex;align-items:center;justify-content:center">
      <i data-lucide="zap" style="width:13px;height:13px;color:#000"></i>
    </div>
    <span style="color:var(--neon);font-weight:800;letter-spacing:0.06em">RestoPro</span>
  </div>
  <button class="btn btn-ghost btn-sm" onclick="logout()">
    <i data-lucide="log-out"></i> Chiqish
  </button>
</div>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="sidebar-brand-icon">
          <i data-lucide="zap"></i>
        </div>
        <div class="sidebar-brand-text">
          <div class="brand-name">RestoPro</div>
          <div class="brand-sub">HR Platform</div>
        </div>
      </div>
      <div class="sidebar-role-badge super">
        <i data-lucide="shield-check" style="width:10px;height:10px"></i> Super Admin
      </div>
      <div class="sidebar-user" style="margin-top:12px">
        <div class="user-name">Bosh Administrator</div>
        <div class="user-role"><i data-lucide="globe" style="width:12px;height:12px"></i> Barcha restoranlar</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">Boshqaruv</div>
      <button class="nav-item active" onclick="showPage('dashboard')">
        <span class="nav-icon"><i data-lucide="layout-dashboard"></i></span> Dashboard
      </button>
      <button class="nav-item" onclick="showPage('restaurants')">
        <span class="nav-icon"><i data-lucide="store"></i></span> Restoranlar
      </button>
    </nav>
    <div class="sidebar-footer">
      <button class="btn btn-ghost btn-full btn-sm" onclick="logout()">
        <i data-lucide="log-out"></i> Chiqish
      </button>
    </div>
  </aside>

  <main class="main-content">
    <!-- DASHBOARD -->
    <div id="page-dashboard" class="page">
      <div class="page-header">
        <div>
          <h1><i data-lucide="layout-dashboard" style="width:22px;height:22px;color:var(--neon);vertical-align:middle;margin-right:8px"></i>Dashboard <span class="neon">✦</span></h1>
          <p>Barcha restoranlar umumiy ko'rinishi</p>
        </div>
        <button class="btn btn-neon" onclick="showPage('restaurants'); openAddModal()">
          <i data-lucide="plus"></i> Restoran qo'shish
        </button>
      </div>
      <div class="page-body">
        <div class="stats-grid" id="dash-stats"></div>
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Restoranlar ro'yxati</h3>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Restoran</th><th>Admin email</th><th>Tarif</th><th>Narx</th>
                  <th>Ofitsiantlar</th><th>Menyu</th><th>Status</th><th>Amallar</th>
                </tr>
              </thead>
              <tbody id="dash-restaurants"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- RESTAURANTS -->
    <div id="page-restaurants" class="page" style="display:none">
      <div class="page-header">
        <div>
          <h1><i data-lucide="store" style="width:22px;height:22px;color:var(--neon);vertical-align:middle;margin-right:8px"></i>Restoranlar</h1>
          <p>Barcha restoranlarni boshqarish</p>
        </div>
        <button class="btn btn-neon" onclick="openAddModal()">
          <i data-lucide="plus"></i> Yangi restoran
        </button>
      </div>
      <div class="page-body">
        <div id="restaurants-list"></div>
      </div>
    </div>
  </main>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="restaurant-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-title">Yangi restoran</h3>
      <button class="modal-close" onclick="closeModal()"><i data-lucide="x"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">
      <div class="grid-2">
        <div class="form-group">
          <label>Restoran nomi *</label>
          <input type="text" class="form-control" id="r-name" placeholder="Tarnov Chilonzor">
        </div>
        <div class="form-group">
          <label>Manzil</label>
          <input type="text" class="form-control" id="r-location" placeholder="Chilonzor tumani">
        </div>
      </div>
      <div class="form-group">
        <label>Admin email *</label>
        <input type="email" class="form-control" id="r-email" placeholder="admin@restoran.uz">
      </div>
      <div class="form-group">
        <label>Admin paroli <span id="pass-hint" style="color:var(--text3)">(yangilash uchun to'ldiring)</span></label>
        <input type="password" class="form-control" id="r-password" placeholder="••••••••">
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label>Tarif rejasi</label>
          <select class="form-control" id="r-plan">
            <option value="basic">Basic</option>
            <option value="premium">Premium</option>
            <option value="enterprise">Enterprise</option>
          </select>
        </div>
        <div class="form-group">
          <label>Oylik narx (so'm)</label>
          <input type="number" class="form-control" id="r-price" placeholder="500000">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Bekor qilish</button>
      <button class="btn btn-neon" id="modal-save-btn" onclick="saveRestaurant()">Saqlash</button>
    </div>
  </div>
</div>

<script src="/js/utils.js?v=3.1"></script>
<script src="/js/i18n.js?v=1.3"></script>
<script>
let dashData = null;

async function init() {
  await requireRole('superadmin');
  lucide.createIcons();
  loadDashboard();
}

async function loadDashboard() {
  try {
    dashData = await api('/api/super/dashboard');
    renderStats();
    renderDashTable();
    renderRestaurantCards();
  } catch (e) {
    toast(e.message, 'error');
  }
}

function renderStats() {
  const d = dashData;
  const cards = [
    { icon:'store',        value:d.total,                             label:'Jami restoranlar', color:'#3498DB', bg:'rgba(52,152,219,0.1)',  border:'rgba(52,152,219,0.25)' },
    { icon:'circle-check', value:d.active,                            label:'Faol restoranlar', color:'#2ECC71', bg:'rgba(46,204,113,0.1)',  border:'rgba(46,204,113,0.25)' },
    { icon:'chef-hat',     value:d.totalWaiters,                      label:'Jami xodimlar',    color:'#9B59B6', bg:'rgba(155,89,182,0.1)', border:'rgba(155,89,182,0.25)' },
    { icon:'utensils',     value:d.totalMenuItems,                    label:'Menyu taomlar',    color:'#F39C12', bg:'rgba(243,156,18,0.1)',  border:'rgba(243,156,18,0.25)' },
    { icon:'wallet',       value:`${(d.totalRevenue/1000000).toFixed(1)}M`, label:"Oylik daromad", color:'#00D4FF', bg:'rgba(0, 212, 255,0.1)', border:'rgba(0, 212, 255,0.25)' },
  ];
  document.getElementById('dash-stats').innerHTML = cards.map(c => `
    <div class="stat-card" style="border-color:${c.border};background:linear-gradient(135deg,${c.bg},var(--card))">
      <div class="stat-icon" style="color:${c.color}"><i data-lucide="${c.icon}"></i></div>
      <div class="stat-value" style="color:${c.color}">${c.value}</div>
      <div class="stat-label">${c.label}</div>
    </div>`).join('');
  renderIcons();
}

function renderDashTable() {
  const tbody = document.getElementById('dash-restaurants');
  if (!dashData.restaurants.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state">
      <div class="empty-icon"><i data-lucide="store"></i></div>
      <h3>Hali restoran yo'q</h3></div></td></tr>`;
    renderIcons(); return;
  }
  tbody.innerHTML = dashData.restaurants.map(r => `
    <tr>
      <td><strong>${r.name}</strong><br><small style="color:var(--text3)">${r.location || '—'}</small></td>
      <td><small>${r.adminEmail}</small></td>
      <td><span class="badge badge-gold">${r.plan}</span></td>
      <td>${formatPrice(r.planPrice)}</td>
      <td>${r.waitersCount}</td>
      <td>${r.menuCount}</td>
      <td>
        <span class="badge ${r.active ? 'badge-success' : 'badge-danger'}">
          ${r.active ? '✓ Faol' : '✕ To\'xtatilgan'}
        </span>
      </td>
      <td>
        <div class="flex gap-8">
          <button class="btn btn-ghost btn-sm btn-icon" onclick="openEditModal('${r.id}')" title="Tahrirlash">
            <i data-lucide="pencil"></i>
          </button>
          <button class="btn btn-sm ${r.active ? '' : 'btn-success'}" onclick="toggleRestaurant('${r.id}')"
            style="${r.active ? 'background:rgba(243,156,18,0.1);color:var(--warning);border:1px solid rgba(243,156,18,0.3)' : ''}">
            <i data-lucide="${r.active ? 'pause' : 'play'}"></i> ${r.active ? 'To\'xtat' : 'Faol'}
          </button>
          <button class="btn btn-danger btn-sm btn-icon" onclick="deleteRestaurant('${r.id}', '${r.name}')" title="O'chirish">
            <i data-lucide="trash-2"></i>
          </button>
        </div>
      </td>
    </tr>
  `).join('');
  renderIcons();
}

function renderRestaurantCards() {
  const container = document.getElementById('restaurants-list');
  if (!dashData.restaurants.length) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-icon"><i data-lucide="store"></i></div>
      <h3>Hali restoran yo'q</h3><p>Yangi restoran qo'shish uchun tugmani bosing</p></div>`;
    renderIcons(); return;
  }
  container.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Restoran</th><th>Admin</th><th>Tarif</th><th>Narx</th><th>Ofitsiantlar</th><th>Savollar</th><th>Status</th><th>Yaratilgan</th><th>Amallar</th></tr>
        </thead>
        <tbody>
          ${dashData.restaurants.map(r => `
          <tr>
            <td>
              <strong>${r.name}</strong>
              ${r.location ? `<br><small style="color:var(--text3)"><i data-lucide="map-pin" style="width:11px;height:11px"></i> ${r.location}</small>` : ''}
            </td>
            <td><small>${r.adminEmail}</small></td>
            <td><span class="badge badge-gold">${r.plan}</span></td>
            <td>${formatPrice(r.planPrice)}</td>
            <td><span class="badge badge-info">${r.waitersCount} kishi</span></td>
            <td><span class="badge badge-ghost">${r.questionsCount || 0} savol</span></td>
            <td><span class="badge ${r.active ? 'badge-success' : 'badge-danger'}">${r.active ? '✓ Faol' : '✕ To\'x.'}</span></td>
            <td><small>${formatDate(r.createdAt)}</small></td>
            <td>
              <div class="flex gap-8">
                <button class="btn btn-ghost btn-sm" onclick="openEditModal('${r.id}')">
                  <i data-lucide="pencil"></i> Tahrir
                </button>
                <button class="btn btn-sm" onclick="toggleRestaurant('${r.id}')"
                  style="${r.active ? 'background:rgba(243,156,18,0.1);color:var(--warning);border:1px solid rgba(243,156,18,0.3)' : 'background:rgba(46,204,113,0.1);color:var(--success);border:1px solid rgba(46,204,113,0.3)'}">
                  <i data-lucide="${r.active ? 'pause' : 'play'}"></i> ${r.active ? 'To\'xtat' : 'Faol'}
                </button>
                <button class="btn btn-danger btn-sm btn-icon" onclick="deleteRestaurant('${r.id}', '${r.name}')">
                  <i data-lucide="trash-2"></i>
                </button>
              </div>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
  renderIcons();
}

function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
  document.getElementById(`page-${page}`).style.display = 'block';
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => {
    if (n.textContent.toLowerCase().includes(page === 'dashboard' ? 'dashboard' : 'restoran')) n.classList.add('active');
  });
  if (window.innerWidth <= 900) {
    document.getElementById('sidebar').classList.remove('mobile-open');
    document.getElementById('sidebar-overlay').classList.remove('show');
  }
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('mobile-open');
  document.getElementById('sidebar-overlay').classList.toggle('show');
}

function openAddModal() {
  document.getElementById('edit-id').value = '';
  document.getElementById('modal-title').textContent = 'Yangi restoran qo\'shish';
  document.getElementById('pass-hint').textContent = '*';
  document.getElementById('modal-save-btn').textContent = 'Qo\'shish';
  ['r-name','r-location','r-email','r-password','r-price'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('r-plan').value = 'basic';
  document.getElementById('restaurant-modal').classList.add('show');
  renderIcons();
}

function openEditModal(id) {
  const r = dashData.restaurants.find(x => x.id === id);
  if (!r) return;
  document.getElementById('edit-id').value = id;
  document.getElementById('modal-title').textContent = 'Restoranni tahrirlash';
  document.getElementById('pass-hint').textContent = '(yangilash uchun to\'ldiring)';
  document.getElementById('modal-save-btn').textContent = 'Saqlash';
  document.getElementById('r-name').value = r.name;
  document.getElementById('r-location').value = r.location || '';
  document.getElementById('r-email').value = r.adminEmail;
  document.getElementById('r-password').value = '';
  document.getElementById('r-plan').value = r.plan || 'basic';
  document.getElementById('r-price').value = r.planPrice || '';
  document.getElementById('restaurant-modal').classList.add('show');
  renderIcons();
}

function closeModal() {
  document.getElementById('restaurant-modal').classList.remove('show');
}

async function saveRestaurant() {
  const id = document.getElementById('edit-id').value;
  const body = {
    name: document.getElementById('r-name').value.trim(),
    location: document.getElementById('r-location').value.trim(),
    adminEmail: document.getElementById('r-email').value.trim(),
    adminPassword: document.getElementById('r-password').value,
    plan: document.getElementById('r-plan').value,
    planPrice: document.getElementById('r-price').value
  };
  if (!id && !body.adminPassword) { toast('Parol majburiy', 'error'); return; }
  try {
    if (id) {
      if (!body.adminPassword) delete body.adminPassword;
      await api(`/api/super/restaurants/${id}`, { method: 'PUT', body: JSON.stringify(body) });
      toast('Restoran yangilandi', 'success');
    } else {
      await api('/api/super/restaurants', { method: 'POST', body: JSON.stringify(body) });
      toast('Restoran qo\'shildi', 'success');
    }
    closeModal();
    loadDashboard();
  } catch (e) { toast(e.message, 'error'); }
}

async function toggleRestaurant(id) {
  try {
    const res = await api(`/api/super/restaurants/${id}/toggle`, { method: 'PATCH' });
    toast(res.active ? 'Restoran faollashtirildi' : 'Restoran to\'xtatildi', 'success');
    loadDashboard();
  } catch (e) { toast(e.message, 'error'); }
}

async function deleteRestaurant(id, name) {
  if (!confirmDialog(`"${name}" restoranini o'chirishni tasdiqlaysizmi? Bu amal qaytarib bo'lmaydi!`)) return;
  try {
    await api(`/api/super/restaurants/${id}`, { method: 'DELETE' });
    toast('Restoran o\'chirildi', 'success');
    loadDashboard();
  } catch (e) { toast(e.message, 'error'); }
}

init();
</script>
</body>
</html>
