<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;font-family:'Nunito Sans',sans-serif}
  ::-webkit-scrollbar{display:none;width:0;height:0}
  *{scrollbar-width:none;-ms-overflow-style:none}
  @keyframes ro-fall{to{transform:translateY(900px) rotate(720deg)}}
  @keyframes ro-pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
  @keyframes ro-rise{from{transform:translateY(26px);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes ro-fade{from{opacity:0}to{opacity:1}}
  @keyframes ro-sheet{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes ro-seal{0%{transform:scale(0) rotate(-28deg);opacity:0}60%{transform:scale(1.14) rotate(7deg)}100%{transform:scale(1) rotate(0);opacity:1}}
  @keyframes ro-breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  @keyframes ro-spin{to{transform:rotate(360deg)}}
  @keyframes q-in{from{transform:translateX(48px);opacity:0}to{transform:translateX(0);opacity:1}}
  @keyframes q-out{from{transform:translateX(0);opacity:1}to{transform:translateX(-48px);opacity:0}}
  @keyframes res-score{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
  @keyframes res-row{from{transform:translateY(22px);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes stroke-fill{from{stroke-dashoffset:var(--full)}to{stroke-dashoffset:var(--off)}}
  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
  .ro-press{transition:transform .12s}
  .ro-press:active{transform:scale(.96)}
  #toast-container{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;width:max-content;max-width:90vw}
  .toast{display:flex;align-items:center;gap:9px;background:#1b3a2d;color:#F5F0E8;padding:11px 16px;border-radius:11px;box-shadow:0 14px 30px rgba(8,16,11,.5);border:1px solid rgba(201,168,76,.3);font-size:15px;font-weight:600}
  .toast-success{border-color:rgba(63,156,108,.5)} .toast-error{border-color:rgba(217,96,59,.55)}
  /* device frame: framed on desktop, fullscreen on phones */
  #stage{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 0%,#e9e6df,#dcd8cf)}
  #device{position:relative;width:390px;height:844px;background:#11241b;border:9px solid #0a140e;border-radius:48px;overflow:hidden;box-shadow:0 40px 90px -30px rgba(10,20,14,.7),0 0 0 1px rgba(255,255,255,.04) inset;display:flex;flex-direction:column}
  @media (max-width:480px){
    #stage{background:#11241b}
    #device{width:100vw;height:100vh;height:100dvh;border:0;border-radius:0;box-shadow:none}
  }
</style>

    <!-- ===== LOGIN ===== -->
    <div id="screen-login" style="position:absolute;inset:0;z-index:60;background:linear-gradient(165deg,#1c4030 0%,#13281e 55%,#0e1f17 100%);display:flex;flex-direction:column;padding:60px 30px 30px;animation:ro-fade .5s ease;overflow-y:auto">
      <div style="position:absolute;inset:0;background:radial-gradient(circle at 78% 12%,rgba(201,168,76,.16),transparent 42%),radial-gradient(circle at 12% 88%,rgba(201,168,76,.10),transparent 45%);pointer-events:none"></div>
      <div style="position:relative;display:flex;flex-direction:column;align-items:center;gap:7px;margin-bottom:26px;animation:ro-rise .6s ease both">
        <div style="width:54px;height:54px;border-radius:50%;border:1.5px solid rgba(201,168,76,.55);display:flex;align-items:center;justify-content:center;color:#C9A84C;font-family:'Nunito Sans',sans-serif;font-size:26px;font-weight:700">R</div>
        <div style="font-family:'Nunito Sans',sans-serif;font-size:30px;font-weight:700;color:#F5F0E8;letter-spacing:.5px;line-height:1">RestoOne</div>
        <div style="font-size:13px;letter-spacing:3px;text-transform:uppercase;color:rgba(201,168,76,.8)">Ofitsiant maktabi</div>
      </div>
      <div style="position:relative;animation:ro-rise .6s ease .08s both">
        <div style="font-size:14px;color:#C1C4BB;margin-bottom:10px;letter-spacing:.3px">Restoranni tanlang</div>

      </div>
      <div style="position:relative;margin-top:24px;display:flex;flex-direction:column;align-items:center;animation:ro-rise .6s ease .16s both">
        <div style="font-size:14px;color:#C1C4BB;margin-bottom:14px;letter-spacing:.3px">4 raqamli PIN-kod</div>
        <div id="pin-slots" style="display:flex;gap:16px;margin-bottom:8px"></div>
        <div id="login-error" style="height:18px;font-size:13px;color:#F0A98D;margin-bottom:8px"></div>
        <div id="pin-keys" style="display:grid;grid-template-columns:repeat(3,72px);gap:14px;justify-content:center"></div>
      </div>
    </div>

    <!-- ===== APP SHELL ===== -->
    <div id="screen-app" style="position:absolute;inset:0;display:none;flex-direction:column;background:#11241b">
      <div id="screens" style="flex:1;min-height:0;position:relative">
        <div id="tab-home" class="tabscreen" style="position:absolute;inset:0;overflow-y:auto;padding-bottom:104px"></div>
        <div id="tab-menyu" class="tabscreen" style="position:absolute;inset:0;overflow-y:auto;padding:8px 18px 104px;display:none"></div>
        <div id="tab-test" class="tabscreen" style="position:absolute;inset:0;overflow-y:auto;padding:8px 22px 104px;display:none"></div>
        <div id="tab-oquv" class="tabscreen" style="position:absolute;inset:0;overflow-y:auto;padding:8px 18px 104px;display:none"></div>
        <div id="tab-tarix" class="tabscreen" style="position:absolute;inset:0;overflow-y:auto;padding:8px 20px 104px;display:none"></div>
        <div id="tab-sertifikat" class="tabscreen" style="position:absolute;inset:0;overflow-y:auto;padding:8px 20px 104px;display:none"></div>
        <div id="tab-reyting" class="tabscreen" style="position:absolute;inset:0;overflow-y:auto;padding:8px 20px 104px;display:none"></div>
        <div id="tab-koproq" class="tabscreen" style="position:absolute;inset:0;overflow-y:auto;padding:8px 18px 104px;display:none"></div>
      </div>
      <!-- bottom nav -->
      <div style="flex:none;position:relative;z-index:10;height:74px;background:rgba(13,28,20,.92);backdrop-filter:blur(14px);border-top:1px solid rgba(245,240,232,.07);display:flex;align-items:center;justify-content:space-around;padding:0 14px 8px">
        <div class="navbtn ro-press" data-tab="home" onclick="go('home')" style="display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;width:56px;padding-top:8px">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="1.9"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
          <span style="font-size:12px;font-weight:600">Asosiy</span>
        </div>
        <div class="navbtn ro-press" data-tab="menyu" onclick="go('menyu')" style="display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;width:56px;padding-top:8px">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#97A298" stroke-width="1.9"><path d="M4 3v7a3 3 0 0 0 6 0V3"/><path d="M7 13v8"/><path d="M18 3c-2 0-3 2-3 5s1 5 3 5"/><path d="M18 3v18"/></svg>
          <span style="font-size:12px;font-weight:600">Menyu</span>
        </div>
        <div class="navbtn ro-press" data-tab="test" onclick="go('test')" style="display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;width:56px;margin-top:-22px">
          <div style="width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#C9A84C,#d8bd6a);display:flex;align-items:center;justify-content:center;box-shadow:0 12px 24px -8px rgba(201,168,76,.7);border:4px solid #0d1c14"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#11241b" stroke-width="2.2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div>
          <span style="font-size:12px;font-weight:700;color:#E0C368">Test</span>
        </div>
        <div class="navbtn ro-press" data-tab="oquv" onclick="go('oquv')" style="display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;width:56px;padding-top:8px">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#97A298" stroke-width="1.9"><path d="M3 5h7a3 3 0 0 1 2 1 3 3 0 0 1 2-1h7v13h-7a3 3 0 0 0-2 1 3 3 0 0 0-2-1H3z"/></svg>
          <span style="font-size:12px;font-weight:600">O'quv</span>
        </div>
        <div class="navbtn ro-press" data-tab="koproq" onclick="go('koproq')" style="display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;width:56px;padding-top:8px">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#97A298" stroke-width="2.4"><circle cx="5" cy="12" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="19" cy="12" r="1.4"/></svg>
          <span style="font-size:12px;font-weight:600">Ko'proq</span>

      </div>
    </div>

    <!-- overlays -->
    <div id="overlay-dish" style="position:absolute;inset:0;z-index:70;display:none"></div>
    <div id="overlay-running" style="position:absolute;inset:0;z-index:80;display:none"></div>
    <div id="overlay-result" style="position:absolute;inset:0;z-index:80;display:none"></div>
    <div id="overlay-cert" style="position:absolute;inset:0;z-index:90;display:none"></div>
    <div id="overlay-analysis" style="position:absolute;inset:0;z-index:88;display:none"></div>
    <div id="overlay-drill" style="position:absolute;inset:0;z-index:86;display:none"></div>
    <div id="overlay-training" style="position:absolute;inset:0;z-index:95;display:none;background:rgba(6,14,10,.96);flex-direction:column;padding:18px"></div>

  </div>

<script src="/js/utils.js?v=5.0"></script>
<script>
"use strict";
const C='#C9A84C', MUT='#97A298';
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

let S = { restaurantId:null, pin:'', tab:'home' };
let waiterInfo=null, historyData=[], menuData=[], menuHidden=false, menuCat='Barchasi', menuQuery='';
let testQuestions=[], qIndex=0, answers={}, selected=null, locked=false, secondsLeft=30, timer=null;
let lastResult=null;

// ---------- ring helper ----------
function ring(pct, size, stroke, color, track){
  const r=(size-stroke)/2, Circ=2*Math.PI*r, off=Circ*(1-Math.max(0,Math.min(1,pct/100)));
  return `<svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${track||'rgba(245,240,232,.10)'}" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-linecap="round" stroke-dasharray="${Circ}" stroke-dashoffset="${off}" style="transition:stroke-dashoffset .5s ease"/></svg>`;
}
function fmtSom(n){ return Number(n||0).toLocaleString('ru-RU').replace(/,/g,' '); }
function waiterName(){ return (waiterInfo&&(waiterInfo.waiter&&waiterInfo.waiter.name||waiterInfo.name))||'Ofitsiant'; }
function todayISO(){ return new Date().toISOString().split('T')[0]; }

// ================= INIT / AUTH =================
async function init(){
  try {
    const me = await api('/api/auth/me');
    if (me.role === 'waiter') { await enterApp(); return; }
  } catch {}
  showLogin();
}

// ================= LOGIN =================
function showLogin(){
  document.getElementById('screen-app').style.display='none';
  document.getElementById('screen-login').style.display='flex';
  renderPin();
  renderKeys();
  loadRestaurants();
}
async function loadRestaurants(){
  try {
    const list = await api('/api/restaurants/list');
    const box = document.getElementById('login-restaurants');
    if (!list.length){ box.innerHTML='<div style="font-size:14px;color:#97A298">Restoran topilmadi</div>'; return; }
    if (!S.restaurantId) S.restaurantId = list[0].id;
    box.innerHTML = list.map(r=>{
      const on = S.restaurantId===r.id;
      const mark = (r.name||'?').trim().charAt(0).toUpperCase();
      return `<div onclick="pickRestaurant('${r.id}')" style="display:flex;align-items:center;gap:12px;padding:13px 15px;border-radius:15px;background:${on?'rgba(201,168,76,.12)':'rgba(245,240,232,.04)'};border:1px solid ${on?'rgba(201,168,76,.5)':'rgba(245,240,232,.08)'};cursor:pointer;transition:all .2s">
        <div style="width:34px;height:34px;border-radius:9px;background:rgba(201,168,76,.14);display:flex;align-items:center;justify-content:center;font-family:'Nunito Sans',sans-serif;font-size:16px;font-weight:700;color:#C9A84C;flex:none">${esc(mark)}</div>
        <div style="flex:1;min-width:0"><div style="font-size:16px;font-weight:600;color:#F5F0E8">${esc(r.name)}</div><div style="font-size:13px;color:#97A298">${esc(r.location||'')}</div></div>
        ${on?'<div style="width:9px;height:9px;border-radius:50%;background:#C9A84C;box-shadow:0 0 0 4px rgba(201,168,76,.22)"></div>':''}
      </div>`;
    }).join('');
  } catch(e){ document.getElementById('login-restaurants').innerHTML='<div style="font-size:14px;color:#F0A98D">'+esc(e.message)+'</div>'; }
}
function pickRestaurant(id){ S.restaurantId=id; loadRestaurants(); }
function renderPin(){
  document.getElementById('pin-slots').innerHTML=[0,1,2,3].map(i=>{
    return i<S.pin.length
      ? '<div style="width:15px;height:15px;border-radius:50%;background:#C9A84C;box-shadow:0 0 0 5px rgba(201,168,76,.18);animation:ro-pop .25s ease"></div>'
      : '<div style="width:15px;height:15px;border-radius:50%;border:1.5px solid rgba(245,240,232,.28)"></div>';
  }).join('');
}
function renderKeys(){
  const labels=['1','2','3','4','5','6','7','8','9','','0','⌫'];
  document.getElementById('pin-keys').innerHTML=labels.map(l=>{
    const blank=l==='', del=l==='⌫';
    const onclick = blank?'' : del?'onclick="backPin()"' : `onclick="pressPin('${l}')"`;
    return `<div class="${blank?'':'ro-press'}" ${onclick} style="height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Nunito Sans',sans-serif;font-size:24px;font-weight:600;color:#F5F0E8;background:${blank?'transparent':'rgba(245,240,232,.07)'};cursor:${blank?'default':'pointer'};user-select:none">${l}</div>`;
  }).join('');
}
function pressPin(d){
  if (S.pin.length>=4) return;
  document.getElementById('login-error').textContent='';
  S.pin += d; renderPin();
  if (S.pin.length===4) setTimeout(doLogin, 200);
}
function backPin(){ S.pin=S.pin.slice(0,-1); renderPin(); }
async function doLogin(){
  try {
    await api('/api/auth/login', { method:'POST', body: JSON.stringify({ loginType:'waiter', restaurantId:S.restaurantId, pin:S.pin }) });
    await enterApp();
  } catch(e){
    document.getElementById('login-error').textContent = e.message || 'PIN xato';
    S.pin=''; renderPin();
  }
}

// ================= APP =================
async function enterApp(){
  document.getElementById('screen-login').style.display='none';
  document.getElementById('screen-app').style.display='flex';
  go('home');
  try { waiterInfo = await api('/api/waiter/info'); } catch {}
  try { historyData = await api('/api/waiter/history') || []; } catch { historyData=[]; }
  renderHome();
}

function go(tab){
  S.tab=tab;
  document.querySelectorAll('.tabscreen').forEach(t=>t.style.display='none');
  // map test→intro screen
  const id = 'tab-'+tab;
  const el = document.getElementById(id);
  if (el) el.style.display='block';
  // nav highlight
  document.querySelectorAll('.navbtn').forEach(b=>{
    const active = b.getAttribute('data-tab')===tab;
    const svg=b.querySelector('svg'), span=b.querySelector('span');
    if (b.getAttribute('data-tab')==='test') return; // center stays gold
    if (svg) svg.setAttribute('stroke', active?C:MUT);
    if (span) span.style.color = active?C:MUT;
  });
  if (tab==='home') renderHome();
  if (tab==='menyu') renderMenu();
  if (tab==='test') renderTestIntro();
  if (tab==='oquv') renderOquv();
  if (tab==='tarix') renderTarix();
  if (tab==='sertifikat') renderSertifikat();
  if (tab==='reyting') renderReyting();
  if (tab==='koproq') renderKoproq();
}

// ---------- HOME ----------
async function renderHome(){
  const name=waiterName(), initial=name.charAt(0).toUpperCase();
  const avg = historyData.length ? Math.round(historyData.reduce((s,r)=>s+(r.score||0),0)/historyData.length) : 0;
  const count = historyData.length;
  const doneToday = historyData.some(r=>r.date===todayISO());
  const isTestDay = !!(waiterInfo&&waiterInfo.isTestDay);
  const anns = (waiterInfo&&waiterInfo.announcements)||[];

  let testCta;
  if (isTestDay && !doneToday){
    testCta = `<div onclick="go('test')" class="ro-press" style="margin-top:20px;display:flex;align-items:center;gap:14px;padding:15px 16px;border-radius:18px;background:linear-gradient(100deg,rgba(201,168,76,.95),rgba(201,168,76,.78));cursor:pointer;box-shadow:0 14px 30px -12px rgba(201,168,76,.6)">
      <div style="width:42px;height:42px;border-radius:12px;background:rgba(17,36,27,.18);display:flex;align-items:center;justify-content:center;flex:none"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#11241b" stroke-width="2.2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div>
      <div style="flex:1"><div style="font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(17,36,27,.6)">Bugun</div><div style="font-size:16px;font-weight:800;color:#11241b">Yangi test mavjud</div></div>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#11241b" stroke-width="2.4"><path d="M9 6l6 6-6 6"/></svg></div>`;
  } else {
    const txt = doneToday ? 'Bugungi test topshirildi ✓' : 'Bugun test kuni emas';
    testCta = `<div style="margin-top:20px;display:flex;align-items:center;gap:14px;padding:15px 16px;border-radius:18px;background:rgba(245,240,232,.06);border:1px solid rgba(245,240,232,.08)">
      <div style="width:42px;height:42px;border-radius:12px;background:rgba(201,168,76,.12);display:flex;align-items:center;justify-content:center;flex:none"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/></svg></div>
      <div style="flex:1"><div style="font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(201,168,76,.7)">Bugun</div><div style="font-size:16px;font-weight:700;color:#F5F0E8">${txt}</div></div></div>`;
  }

  document.getElementById('tab-home').innerHTML = `
    <div style="position:relative;padding:6px 22px 26px;background:radial-gradient(circle at 80% -10%,rgba(201,168,76,.2),transparent 46%),linear-gradient(160deg,#1f4232,#13281e);border-radius:0 0 30px 30px;overflow:hidden;animation:ro-rise .5s ease both">
      <div style="position:absolute;right:-30px;top:-30px;width:150px;height:150px;border-radius:50%;border:1px solid rgba(201,168,76,.18)"></div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div><div style="font-size:15px;color:#C1C4BB">Salom,</div><div style="font-family:'Nunito Sans',sans-serif;font-size:28px;font-weight:700;color:#F5F0E8;line-height:1.05">${esc(name)} 👋</div></div>
        <div style="width:46px;height:46px;border-radius:50%;background:rgba(245,240,232,.1);border:1px solid rgba(201,168,76,.4);display:flex;align-items:center;justify-content:center;font-family:'Nunito Sans',sans-serif;font-size:18px;font-weight:700;color:#C9A84C">${esc(initial)}</div>
      </div>
      ${testCta}
    </div>
    <div id="home-kpi" style="margin:18px 18px 0"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 18px 0">
      <div style="padding:16px;border-radius:18px;background:#1b3a2d;border:1px solid rgba(245,240,232,.07);animation:ro-rise .5s ease .12s both"><div style="font-family:'Nunito Sans',sans-serif;font-size:33px;font-weight:700;color:#F5F0E8;line-height:1"><span id="ct-avg">0</span><span style="font-size:17px;color:#C9A84C">%</span></div><div style="font-size:13px;color:#97A298;margin-top:2px">O'rtacha ball</div></div>

      </div>
    </div>`;
  countTo('ct-avg', avg); countTo('ct-count', count);

}
function countTo(id, target){
  const el=document.getElementById(id); if(!el) return;
  const t0=performance.now(), dur=900;
  (function step(n){ const p=Math.min(1,(n-t0)/dur), e=1-Math.pow(1-p,3); el.textContent=Math.round(e*target); if(p<1) requestAnimationFrame(step); else el.textContent=target; })(performance.now());
}
async function loadHomeKPI(){
  const box=document.getElementById('home-kpi'); if(!box) return;
  let k=null; try { k = await api('/api/waiter/kpi'); } catch {}
  if (!k || k.level==='nodata'){ box.innerHTML=''; return; }
  const pct = (k.score!=null? k.score : (historyData.length?Math.round(historyData.reduce((s,r)=>s+(r.score||0),0)/historyData.length):0));
  const pen = k.penalty||0;
  const bonusLine = pen>0 ? `<div style="font-family:'Nunito Sans',sans-serif;font-size:20px;font-weight:700;color:#C9A84C;line-height:1.1">+${pen}% <span style="font-size:15px;color:#97A298">bonus 🏆</span></div>`

  box.innerHTML = `<div style="padding:20px;border-radius:22px;background:linear-gradient(150deg,#21463440,#1b3a2d);border:1px solid rgba(201,168,76,.16);display:flex;align-items:center;gap:20px;animation:ro-rise .5s ease .06s both">

    <div style="flex:1;display:flex;flex-direction:column;gap:12px"><div><div style="font-size:13px;color:#97A298">${esc(k.periodLabel||'Joriy davr')} · ${esc(k.level||'')}</div>${bonusLine}</div><div style="height:1px;background:rgba(245,240,232,.08)"></div><div style="font-size:13px;color:#C1C4BB;line-height:1.5">KPI ≥ 90% bo'lsa bonus oshadi. Davom eting!</div></div>

}

let drillKnown = new Set(), drillQueue = [], drillIdx = 0, drillRevealed = false, drillStats = {ok:0, again:0};

async function loadDrillProgress(){
  try {
    const p = await api('/api/waiter/menu-progress');
    drillKnown = new Set(p?.knownDishIds || []);
  } catch { drillKnown = new Set(); }
  const sub = document.getElementById('drill-sub');
  if (sub && menuData.length) {
    const n = menuData.filter(d=>drillKnown.has(d.id)).length;
    sub.textContent = `${n} / ${menuData.length} ta taomni bilasiz`;
  }
}

async function openDrill(){
  await loadDrillProgress();
  const box = document.getElementById('overlay-drill');
  box.style.display = 'block';
  drillStart();
}
function closeDrill(){
  const box = document.getElementById('overlay-drill');
  box.style.display='none'; box.innerHTML='';
  loadDrillProgress();
}

function drillStart(){
  const total = menuData.length;
  const known = menuData.filter(d=>drillKnown.has(d.id)).length;
  const pct = total ? Math.round(known/total*100) : 0;
  const cats = ['Barchasi', ...Array.from(new Set(menuData.map(m=>m.category).filter(Boolean)))];
  const box = document.getElementById('overlay-drill');
  box.innerHTML = `<div style="position:absolute;inset:0;overflow-y:auto;background:linear-gradient(170deg,#163326,#0f1f17);padding:22px 18px 40px">

        ${ring(pct,84,8,'#C9A84C')}
        <div style="position:absolute;font-family:'Nunito Sans',sans-serif;font-size:21px;font-weight:700;color:#F5F0E8">${pct}<span style="font-size:14px">%</span></div>

      <div style="flex:1;min-width:0">
        <div style="font-family:'Nunito Sans',sans-serif;font-size:19px;font-weight:700;color:#F5F0E8;line-height:1.1">${known} / ${total}</div>
        <div style="font-size:14px;color:#97A298;margin-top:3px;line-height:1.5">taomni bilaman deb belgiladingiz</div>
      </div>
    </div>
    <div style="font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#C9A84C;font-weight:700;margin-bottom:10px">Qaysi bo'limni mashq qilamiz?</div>
    <div style="display:flex;flex-direction:column;gap:9px">
      ${cats.map((c,i)=>{
        const list = c==='Barchasi' ? menuData : menuData.filter(d=>d.category===c);
        const k = list.filter(d=>drillKnown.has(d.id)).length;
        const left = list.length - k;
        return `<div onclick="drillBegin(${i})" class="ro-press" style="display:flex;align-items:center;gap:12px;padding:13px 15px;border-radius:14px;background:#1b3a2d;border:1px solid rgba(245,240,232,.07);cursor:pointer">
          <div style="flex:1;min-width:0"><div style="font-size:15px;font-weight:600;color:#F5F0E8">${esc(c)}</div>
          <div style="font-size:13px;color:#97A298;margin-top:2px">${left>0?`${left} ta o'rganilmagan`:'hammasi o\'rganilgan ✓'} · jami ${list.length}</div></div>
          <div style="flex:none;width:44px;height:5px;border-radius:5px;background:rgba(245,240,232,.1);overflow:hidden"><div style="height:100%;width:${list.length?Math.round(k/list.length*100):0}%;background:#C9A84C"></div></div>
        </div>`;
      }).join('')}
    </div></div>`;
}

function drillBegin(catIdx){
  const cats = ['Barchasi', ...Array.from(new Set(menuData.map(m=>m.category).filter(Boolean)))];
  const c = cats[catIdx] || 'Barchasi';
  const pool = c==='Barchasi' ? menuData.slice() : menuData.filter(d=>d.category===c);
  const unknown = pool.filter(d=>!drillKnown.has(d.id));
  let list = (unknown.length ? unknown : pool).slice();
  for (let i=list.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [list[i],list[j]]=[list[j],list[i]]; }
  drillQueue = list.slice(0, 20);          // bir seansda 20 tadan — charchatmaydi
  drillIdx = 0; drillRevealed = false; drillStats = {ok:0, again:0};
  drillCard();
}

  const box = document.getElementById('overlay-drill');
  if (drillIdx >= drillQueue.length) return drillFinish();
  const d = drillQueue[drillIdx];
  const ings = ingChips(d.description);
  const hasAllerg = !!(d.allergens && d.allergens.length);
  const pct = Math.round(drillIdx / drillQueue.length * 100);

  box.innerHTML = `<div style="position:absolute;inset:0;display:flex;flex-direction:column;background:linear-gradient(170deg,#163326,#0f1f17);padding:18px 18px 22px">

      <div style="flex:1;height:5px;border-radius:5px;background:rgba(245,240,232,.1);overflow:hidden"><div style="height:100%;width:${pct}%;background:#C9A84C;transition:width .3s"></div></div>
      <div style="flex:none;font-size:14px;color:#97A298;font-weight:600">${drillIdx+1}/${drillQueue.length}</div>
    </div>

    <div style="flex:1;min-height:0;overflow-y:auto">
      <div style="border-radius:20px;overflow:hidden;background:#1b3a2d;border:1px solid rgba(245,240,232,.07)">

function drillReveal(){ drillRevealed = true; drillCard(); }

function drillAnswer(known){
  const d = drillQueue[drillIdx];
  if (known) { drillKnown.add(d.id); drillStats.ok++; }
  else { drillKnown.delete(d.id); drillStats.again++; }
  api('/api/waiter/menu-progress/'+encodeURIComponent(d.id), {method:'POST', body: JSON.stringify({known})}).catch(()=>{});
  drillIdx++; drillRevealed = false;
  drillCard();
}

function drillFinish(){
  const total = menuData.length;
  const known = menuData.filter(d=>drillKnown.has(d.id)).length;
  const pct = total ? Math.round(known/total*100) : 0;
  const box = document.getElementById('overlay-drill');
  box.innerHTML = `<div style="position:absolute;inset:0;overflow-y:auto;background:linear-gradient(170deg,#163326,#0f1f17);padding:34px 22px;display:flex;flex-direction:column;align-items:center;justify-content:center">

        <div style="font-size:12px;color:#97A298;margin-top:3px">BILDIM</div></div>
      <div style="flex:1;padding:13px;border-radius:14px;background:rgba(217,96,59,.10);border:1px solid rgba(217,96,59,.28);text-align:center">
        <div style="font-family:'Nunito Sans',sans-serif;font-size:23px;font-weight:700;color:#F0A98D;line-height:1">${drillStats.again}</div>
        <div style="font-size:12px;color:#97A298;margin-top:3px">TAKRORLASH</div></div>

      <div onclick="closeDrill()" style="padding:14px;border-radius:14px;background:rgba(245,240,232,.07);border:1px solid rgba(245,240,232,.1);color:#F5F0E8;font-weight:600;font-size:16px;text-align:center;cursor:pointer">Menyuga qaytish</div>
    </div>

async function startTest(){
  try {
    const data = await api('/api/waiter/test/start');
    testQuestions=data.questions||[]; qIndex=0; answers={}; selected=null; locked=false;
    const ov=document.getElementById('overlay-running');
    ov.style.display='block';
    // Build permanent shell once
    ov.innerHTML=`<div id="q-shell" style="position:absolute;inset:0;background:linear-gradient(170deg,#163326,#0f1f17);display:flex;flex-direction:column;padding:54px 24px 30px">

        <div onclick="quitTest()" style="cursor:pointer;flex:none"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#C1C4BB" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg></div>
        <div style="flex:1;height:7px;border-radius:6px;background:rgba(245,240,232,.1);overflow:hidden"><div id="q-prog" style="height:100%;border-radius:6px;background:linear-gradient(90deg,#C9A84C,#d8bd6a);width:0%;transition:width .5s cubic-bezier(.4,0,.2,1)"></div></div>
        <div id="q-num" style="font-size:15px;font-weight:700;color:#F5F0E8;white-space:nowrap">1<span style="color:#97A298">/${testQuestions.length}</span></div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;margin:14px 0 18px">
        <div style="position:relative;width:74px;height:74px;display:flex;align-items:center;justify-content:center">
          <div id="timer-ring">${ring(100,74,6,C)}</div>
          <div id="timer-num" style="position:absolute;font-family:'Nunito Sans',sans-serif;font-size:25px;font-weight:700;color:#F5F0E8">30</div>
        </div>
      </div>
      <div id="q-content" style="display:flex;flex-direction:column;flex:1;min-height:0"></div>
    </div>`;
    showQuestion(true);
  } catch(e){ toast(e.message,'error'); if((e.message||'').includes('allaqachon')){ renderTestIntro(); } }
}

function showQuestion(first){
  const q=testQuestions[qIndex]; selected=null; locked=false; secondsLeft=30;
  const letters=['A','B','C','D'];
  // update shell top
  const prog=document.getElementById('q-prog');
  const num=document.getElementById('q-num');
  if(prog) prog.style.width=Math.round((qIndex+1)/testQuestions.length*100)+'%';
  if(num) num.innerHTML=`${qIndex+1}<span style="color:#97A298">/${testQuestions.length}</span>`;

  const html=`<div style="font-family:'Nunito Sans',sans-serif;font-size:21px;font-weight:700;line-height:1.35;color:#F5F0E8;text-align:center;flex:1;display:flex;align-items:center;justify-content:center;padding:0 4px">${esc(q.question)}</div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:auto">
      ${q.options.map((o,i)=>`<div onclick="pickAnswer(${i})" id="opt-${i}" style="display:flex;align-items:center;gap:13px;padding:15px;border-radius:16px;background:rgba(245,240,232,.05);border:1.5px solid rgba(245,240,232,.1);cursor:pointer;transition:background .2s,border-color .2s,opacity .2s;animation:res-row .3s ease ${i*0.06}s both">
        <div style="width:28px;height:28px;border-radius:9px;flex:none;display:flex;align-items:center;justify-content:center;font-family:'Nunito Sans',sans-serif;font-size:16px;font-weight:700;color:#C9A84C;background:rgba(245,240,232,.1);transition:background .2s,color .2s">${letters[i]}</div>
        <span style="flex:1;font-size:16px;font-weight:500;color:#F5F0E8;line-height:1.35">${esc(o)}</span>
      </div>`).join('')}
    </div>`;

  const content=document.getElementById('q-content');
  if(!content) return;
  if(first){
    content.style.animation='q-in .35s cubic-bezier(.25,.9,.3,1) both';
    content.innerHTML=html;
  } else {
    // slide out current, then slide in new
    content.style.animation='q-out .22s ease forwards';
    setTimeout(()=>{
      if(!document.getElementById('q-content')) return;
      content.innerHTML=html;
      content.style.animation='q-in .3s cubic-bezier(.25,.9,.3,1) both';
    }, 220);
  }
  startTimer();
}

function startTimer(){
  clearInterval(timer); secondsLeft=30; paintTimer();
  timer=setInterval(()=>{ secondsLeft--; paintTimer(); if(secondsLeft<=0){ clearInterval(timer); if(!locked) lockAnswer(-1); } },1000);
}
function paintTimer(){
  const col = secondsLeft<=10?'#F0A98D':C;
  const rg=document.getElementById('timer-ring'), nm=document.getElementById('timer-num');
  if(rg) rg.innerHTML=ring(secondsLeft/30*100,74,6,col);
  if(nm){ nm.textContent=Math.max(secondsLeft,0); nm.style.color=secondsLeft<=10?'#F0A98D':'#F5F0E8'; }
}
function pickAnswer(i){ if(locked) return; lockAnswer(i); }
function lockAnswer(i){
  locked=true; selected=i; clearInterval(timer);
  const q=testQuestions[qIndex];
  answers[q.id] = i>=0 ? i : -1;
  // highlight selected, dim others
  for(let k=0;k<q.options.length;k++){
    const el=document.getElementById('opt-'+k); if(!el) continue;
    el.style.cursor='default';
    if(k===i){
      el.style.background='rgba(201,168,76,.18)';
      el.style.borderColor=C;
      el.firstElementChild.style.background=C;
      el.firstElementChild.style.color='#11241b';
    } else {
      el.style.opacity='.35';
    }
  }
  setTimeout(advance, 520);
}
function advance(){
  if(qIndex<testQuestions.length-1){ qIndex++; showQuestion(false); }
  else { submitTest(); }
}
function quitTest(){
  clearInterval(timer);
  document.getElementById('overlay-running').style.display='none';
  document.getElementById('overlay-running').innerHTML='';
  go('home');
}
async function submitTest(){
  clearInterval(timer);
  // Show loading screen (parallel with API call)
  const ov=document.getElementById('overlay-running');
  ov.innerHTML=`<div style="position:absolute;inset:0;background:linear-gradient(170deg,#163326,#0f1f17);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;animation:ro-fade .3s ease">
    <div style="width:54px;height:54px;border-radius:50%;border:3px solid rgba(201,168,76,.2);border-top-color:#C9A84C;animation:ro-spin .8s linear infinite"></div>
    <div style="font-family:'Nunito Sans',sans-serif;font-size:18px;font-weight:700;color:#C1C4BB">Natija hisoblanmoqda…</div>
  </div>`;
  try {
    const [data] = await Promise.all([
      api('/api/waiter/test/submit', { method:'POST', body: JSON.stringify({ answers }) }),
      new Promise(r=>setTimeout(r, 600)) // min loading time so it doesn't flash
    ]);
    const r=data.result; lastResult=r;
    if(waiterInfo) waiterInfo.isTestDay=false;
    try { historyData = await api('/api/waiter/history')||historyData; } catch {}
    ov.style.display='none'; ov.innerHTML='';
    showResult(r);
  } catch(e){ toast(e.message,'error'); ov.style.display='none'; ov.innerHTML=''; go('home'); }
}
function showResult(r){
  if(!r){ toast('Natija yuklanmadi','error'); go('home'); return; }
  const score = r.score ?? 0;
  const passed = score >= 90;
  const easyScore=r.easyScore??0, easyTotal=r.easyTotal??0;
  const mediumScore=r.mediumScore??0, mediumTotal=r.mediumTotal??0;
  const hardScore=r.hardScore??0, hardTotal=r.hardTotal??0;
  const totalCorrect=r.totalCorrect??(easyScore+mediumScore+hardScore);
  const totalQuestions=r.totalQuestions??(easyTotal+mediumTotal+hardTotal);
  const ringColor = passed ? C : score>=60 ? '#e3c06a' : '#F0A98D';
  const grade = score>=90?'A\'lo':score>=75?'Yaxshi':score>=60?'Qoniqarli':'Pastroq';

  // confetti only for passing
  const confettiHtml = passed ? Array.from({length:44},(_,i)=>{
    const cols=['#C9A84C','#d8bd6a','#F5F0E8','#8FDDB2','#e2c879','#f0c5b5'];
    const w=5+Math.random()*6, h=8+Math.random()*8, delay=Math.random()*0.8;

  }).join('') : '';

  const ov=document.getElementById('overlay-result');
  ov.style.display='block';
  ov.innerHTML=`
  <div style="position:absolute;inset:0;overflow:hidden;pointer-events:none">${confettiHtml}</div>
  <div style="position:absolute;inset:0;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:36px 26px 32px;background:radial-gradient(circle at 50% 0%,${passed?'rgba(201,168,76,.22)':'rgba(217,96,59,.14)'},transparent 52%),linear-gradient(170deg,#163326,#0f1f17)">

    <!-- label -->
    <div style="font-size:12px;letter-spacing:4px;text-transform:uppercase;color:${passed?'rgba(201,168,76,.8)':'rgba(245,240,232,.4)'};animation:ro-fade .5s ease both">${passed?'✦ Tabriklaymiz ✦':'Natija'}</div>

    <!-- ring + score -->
    <div style="position:relative;width:186px;height:186px;display:flex;align-items:center;justify-content:center;margin:18px 0 10px;animation:res-score .6s cubic-bezier(.2,.9,.25,1) .1s both">
      <svg width="186" height="186" style="position:absolute;transform:rotate(-90deg)">
        <circle cx="93" cy="93" r="80" fill="none" stroke="rgba(245,240,232,.07)" stroke-width="11"/>
        <circle id="res-arc" cx="93" cy="93" r="80" fill="none" stroke="${ringColor}" stroke-width="11" stroke-linecap="round"
          stroke-dasharray="${2*Math.PI*80}" stroke-dashoffset="${2*Math.PI*80}"
          style="transition:stroke-dashoffset 1.1s cubic-bezier(.4,0,.2,1) .35s"/>
      </svg>
      <div style="position:absolute;text-align:center">
        <div id="res-num" style="font-family:'Nunito Sans',sans-serif;font-size:55px;font-weight:700;color:#F5F0E8;line-height:1;transition:color .4s">0<span style="font-size:24px;color:${ringColor}">%</span></div>
        <div style="font-size:13px;color:#97A298;margin-top:2px">${totalCorrect}/${totalQuestions} to'g'ri</div>
      </div>
    </div>

    <!-- grade badge -->
    <div style="padding:6px 20px;border-radius:20px;background:${passed?'rgba(201,168,76,.15)':'rgba(245,240,232,.06)'};border:1px solid ${passed?'rgba(201,168,76,.4)':'rgba(245,240,232,.12)'};font-family:'Nunito Sans',sans-serif;font-size:18px;font-weight:700;color:${ringColor};animation:ro-rise .5s ease .5s both">${grade}</div>

    <!-- breakdown bars -->
    <div style="width:100%;margin:22px 0 20px;display:flex;flex-direction:column;gap:10px">
      ${[
        ['Oson',    easyScore,   easyTotal,   '#8FDDB2', 0.55],
        ["O'rta",  mediumScore, mediumTotal, '#e3c06a', 0.65],
        ['Qiyin',   hardScore,   hardTotal,   '#F0A98D', 0.75],
      ].map(([lbl,sc,tot,col,delay])=>{
        const pct=tot>0?Math.round(sc/tot*100):0;
        return `<div style="animation:res-row .4s ease ${delay}s both">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px">
            <span style="font-size:14px;color:#C1C4BB;font-weight:600">${lbl}</span>
            <span style="font-family:'Nunito Sans',sans-serif;font-size:16px;font-weight:700;color:${col}">${sc}<span style="font-size:13px;color:#97A298">/${tot}</span></span>
          </div>
          <div style="height:6px;border-radius:6px;background:rgba(245,240,232,.08);overflow:hidden">

          </div>
        </div>`;
      }).join('')}
    </div>

    <!-- actions -->
    <div style="width:100%;display:flex;flex-direction:column;gap:10px;animation:res-row .4s ease .9s both">
      ${r.hasCertificate?`<div onclick="openCert()" class="ro-press" style="padding:16px;border-radius:16px;background:linear-gradient(100deg,#C9A84C,#d8bd6a);color:#11241b;font-weight:800;font-size:16px;cursor:pointer;text-align:center;box-shadow:0 14px 34px -12px rgba(201,168,76,.7)">🏆 Sertifikatni olish</div>`:''}

      <div onclick="closeResult();go('tarix')" class="ro-press" style="padding:14px;border-radius:14px;background:rgba(245,240,232,.07);border:1px solid rgba(245,240,232,.1);font-size:16px;color:#F5F0E8;font-weight:600;cursor:pointer;text-align:center">Batafsil tarix →</div>
      <div onclick="closeResult();go('home')" style="padding:8px;font-size:15px;color:#97A298;cursor:pointer;text-align:center">Bosh sahifa</div>
    </div>
  </div>`;

  // animate ring + score counter after DOM paint
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      // fill ring
      const arc=document.getElementById('res-arc');
      if(arc) arc.style.strokeDashoffset = 2*Math.PI*80*(1-score/100);
      // count up score
      const numEl=document.getElementById('res-num');
      if(numEl){
        const dur=900, t0=performance.now();
        const scoreColor = passed?C:score>=60?'#e3c06a':'#F0A98D';
        (function tick(now){
          const p=Math.min(1,(now-t0)/dur), e=1-Math.pow(1-p,3);
          const v=Math.round(e*score);
          numEl.innerHTML=`${v}<span style="font-size:24px;color:${ringColor}">%</span>`;
          if(p<1) requestAnimationFrame(tick);
        })(performance.now());
      }
      // animate bars
      document.querySelectorAll('.res-bar').forEach(b=>{
        b.style.width=b.dataset.pct+'%';
      });
    });
  });
}

          </div>
          <div style="height:5px;border-radius:4px;background:rgba(245,240,232,.1);margin-bottom:12px;overflow:hidden"><div style="height:100%;width:${pct}%;border-radius:4px;background:linear-gradient(90deg,#C9A84C,#d8bd6a)"></div></div>
          <div style="display:flex;flex-direction:column;gap:9px">${items.map(t=>{const d=t.done||t.completed;return `<div style="display:flex;align-items:center;gap:11px"><div style="width:20px;height:20px;border-radius:6px;flex:none;display:flex;align-items:center;justify-content:center;background:${d?C:'transparent'};border:1.5px solid ${d?C:'rgba(245,240,232,.22)'}">${d?'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#11241b" stroke-width="3.4"><path d="M5 12l5 5L20 6"/></svg>':''}</div><span style="font-size:15px;color:${d?'rgba(245,240,232,.45)':'#F5F0E8'};text-decoration:${d?'line-through':''}">${esc(t.label||t.title||t.text||'')}</span></div>`;}).join('')}</div>
        </div>`;
    }
  } catch {}
}
async function doLogout(){ try { await api('/api/auth/logout',{method:'POST'}); } catch {} location.reload(); }

init();
</script>
</body>
</html>
