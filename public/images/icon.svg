<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141414"/>
      <stop offset="100%" style="stop-color:#0A0A0A"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E5A93A"/>
      <stop offset="50%" style="stop-color:#C8922A"/>
      <stop offset="100%" style="stop-color:#A07520"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" style="stop-color:#C8922A;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#C8922A;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Glow -->
  <rect width="512" height="512" rx="96" fill="url(#glow)"/>
  <!-- Gold border -->
  <rect x="16" y="16" width="480" height="480" rx="80" fill="none" stroke="#C8922A" stroke-width="3" opacity="0.4"/>
  <!-- T letter -->
  <text x="256" y="318" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="280" text-anchor="middle" fill="url(#gold)">T</text>
  <!-- Star decorations -->
  <text x="256" y="460" font-family="Arial" font-size="48" text-anchor="middle" fill="#C8922A" opacity="0.6">✦</text>
  <text x="96" y="160" font-family="Arial" font-size="28" text-anchor="middle" fill="#C8922A" opacity="0.25">✦</text>
  <text x="416" y="160" font-family="Arial" font-size="28" text-anchor="middle" fill="#C8922A" opacity="0.25">✦</text>
</svg>
