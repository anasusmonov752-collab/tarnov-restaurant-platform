services:
  - type: web
    name: tarnov-restaurant-platform
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
    disk:
      name: tarnov-data
      mountPath: /app/data
      sizeGB: 1
